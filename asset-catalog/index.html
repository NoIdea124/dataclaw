<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>资产目录 — DataClaw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ── */
:root {
  --bg:         #ffffff;
  --bg-panel:   #ffffff;
  --bg-card:    #ffffff;
  --bg-hover:   #f4f4f4;
  --bg-hdr:     #f8f8f8;
  --border:     #e8e8e8;
  --border-med: #cccccc;
  --accent:     #111111;
  --tx:         #0d0d0d;
  --tx2:        #555555;
  --txm:        #999999;
  --txd:        #cccccc;
  --sh-xs: 0 1px 2px rgba(0,0,0,.06);
  --sh-sm: 0 1px 6px rgba(0,0,0,.09);
  --sh-md: 0 2px 14px rgba(0,0,0,.10);
  --r:    12px;
  --r-sm:  8px;
  --r-xs:  5px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  --ease: cubic-bezier(.16,1,.3,1);
  --t:    .16s;
}
[data-theme="dark"] {
  --bg:         #0a0a0a;
  --bg-panel:   #111111;
  --bg-card:    #181818;
  --bg-hover:   #202020;
  --bg-hdr:     #161616;
  --border:     #252525;
  --border-med: #333333;
  --accent:     #d8d8d8;
  --tx:         #efefef;
  --tx2:        #aaaaaa;
  --txm:        #666666;
  --txd:        #333333;
  --sh-xs: 0 1px 2px rgba(0,0,0,.45);
  --sh-sm: 0 1px 6px rgba(0,0,0,.55);
  --sh-md: 0 2px 14px rgba(0,0,0,.6);
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-feature-settings:'ss01','cv01';background:var(--bg);color:var(--tx);display:flex;flex-direction:column;height:100vh;-webkit-font-smoothing:antialiased;transition:background var(--t),color var(--t)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--txm)}

/* ── Toolbar ── */
.toolbar{height:52px;padding:0 18px;display:flex;align-items:center;gap:12px;background:var(--bg-panel);border-bottom:1px solid var(--border);flex-shrink:0;transition:background var(--t),border-color var(--t)}
.brand{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none}
.brand-mark{width:28px;height:28px;border-radius:7px;background:#0891b2;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--mono);color:#fff;letter-spacing:-.3px;flex-shrink:0}
.brand-name{font-size:14.5px;font-weight:700;letter-spacing:-.3px;color:var(--tx);white-space:nowrap;transition:color var(--t)}
.brand-tag{font-size:10px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:2px 6px;border-radius:3px;white-space:nowrap}
.brand-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.srch{position:relative;flex-shrink:0;width:240px}
.srch input{width:100%;height:32px;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:0 10px 0 28px;color:var(--tx);font-size:12.5px;font-family:var(--font);outline:none;transition:border-color var(--t),background var(--t)}
.srch input:focus{background:var(--bg-card);border-color:var(--border-med)}
.srch input::placeholder{color:var(--txm)}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txm);pointer-events:none;font-size:12px;line-height:1}
.tb-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.tb-count{font-size:11.5px;color:var(--txm);white-space:nowrap;padding-right:2px}
.hdr-tabs{display:flex;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:2px;gap:1px}
.hdr-tab{padding:4px 14px;border-radius:4px;border:none;font-size:12px;font-weight:500;cursor:pointer;color:var(--txm);transition:all var(--t);background:none;font-family:var(--font)}
.hdr-tab:hover{color:var(--tx2)}
.hdr-tab.active{background:var(--bg-card);color:var(--tx);box-shadow:var(--sh-xs)}
.ibtn{width:30px;height:30px;border:1px solid var(--border);background:none;border-radius:var(--r-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all var(--t);font-size:14px;line-height:1}
.ibtn:hover{border-color:var(--border-med);color:var(--tx);background:var(--bg-hover)}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:172px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:12px 8px;background:var(--bg-panel);transition:background var(--t),border-color var(--t)}
.sb-label{font-size:10px;font-weight:600;color:var(--txm);letter-spacing:.7px;text-transform:uppercase;padding:2px 8px 7px;display:block}
.nav-item{display:flex;align-items:center;width:100%;padding:7px 8px;border-radius:var(--r-xs);border:none;background:none;cursor:pointer;text-align:left;font-family:var(--font);gap:8px;transition:background var(--t);position:relative}
.nav-item:hover{background:var(--bg-hover)}
.nav-item.active{background:var(--bg-hover)}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;border-radius:2px;background:var(--accent)}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-sq{width:7px;height:7px;border-radius:3px;flex-shrink:0}
.nav-name{font-size:12.5px;font-weight:500;color:var(--tx2);flex:1;line-height:1.3;transition:color var(--t)}
.nav-item:hover .nav-name{color:var(--tx)}
.nav-item.active .nav-name{color:var(--tx);font-weight:600}
.nav-cnt{font-size:10px;font-family:var(--mono);color:var(--txm);background:var(--bg-card);border:1px solid var(--border);padding:1px 5px;border-radius:3px;transition:background var(--t),border-color var(--t),color var(--t)}
.nav-item.active .nav-cnt{color:var(--tx2);border-color:var(--border-med)}
.nav-divider{height:1px;background:var(--border);margin:6px 0}

/* ── Main ── */
.main{flex:1;overflow-y:auto;background:var(--bg);transition:background var(--t)}

/* ── Asset List ── */
.mlist-hdr{display:grid;grid-template-columns:170px 1fr 260px;padding:6px 16px;border-bottom:1px solid var(--border);background:var(--bg-hdr);position:sticky;top:0;z-index:5;transition:background var(--t),border-color var(--t)}
.mlist-hdr-cell{font-size:10px;font-weight:600;color:var(--txm);letter-spacing:.5px;text-transform:uppercase}

.mrow{display:grid;grid-template-columns:170px 1fr 260px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:16px;transition:background var(--t)}
.mrow:hover{background:var(--bg-hover)}
.mrow.active{background:var(--bg-hover);box-shadow:inset 2px 0 0 var(--accent)}

/* Left meta column */
.mr-meta{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.mr-cat{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--tx2)}
.mr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Layer badge */
.layer-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;width:fit-content;letter-spacing:.2px}
.layer-ODS{background:rgba(245,158,11,.1);color:#d97706}
.layer-DWD{background:rgba(59,130,246,.1);color:#2563eb}
.layer-DWS{background:rgba(16,185,129,.1);color:#059669}
.layer-ADS{background:rgba(139,92,246,.1);color:#7c3aed}
.layer-DIM{background:rgba(107,114,128,.12);color:#6b7280}

/* Sensitivity badge */
.sens-badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;white-space:nowrap}
.sens-机密{background:rgba(239,68,68,.1);color:#dc2626}
.sens-内部{background:rgba(245,158,11,.1);color:#d97706}
.sens-公开{background:rgba(16,185,129,.1);color:#059669}

/* Center info column */
.mr-info{min-width:0}
.mr-name{font-size:13.5px;font-weight:650;color:var(--tx);letter-spacing:-.2px;margin-bottom:2px;line-height:1.3;transition:color var(--t)}
.mr-id{font-size:10.5px;font-family:var(--mono);color:var(--txd);margin-bottom:5px;letter-spacing:-.1px}
.mr-desc{font-size:12px;color:var(--tx2);line-height:1.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Right column */
.mr-right{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
.mr-right-top{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.mr-owner{font-size:11.5px;color:var(--tx2)}
.freq-chip{font-size:10.5px;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:2px 8px;border-radius:3px;font-family:var(--mono);white-space:nowrap;transition:background var(--t),border-color var(--t)}

/* ── Layer Overview Grid ── */
.layer-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;padding:16px}
.layer-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh-xs);transition:background var(--t),border-color var(--t)}
.layer-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.layer-card-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.3px}
.layer-card-count{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--tx)}
.layer-card-label{font-size:11px;color:var(--txm)}
.layer-card-fullname{font-size:13.5px;font-weight:650;color:var(--tx);letter-spacing:-.2px;margin-bottom:4px}
.layer-card-desc{font-size:12px;color:var(--tx2);line-height:1.65;margin-bottom:10px}
.layer-card-tables{display:flex;flex-direction:column;gap:3px;max-height:160px;overflow-y:auto}
.layer-table-row{display:flex;align-items:center;gap:7px;padding:4px 8px;border-radius:var(--r-xs);background:var(--bg-hover);cursor:pointer;transition:background var(--t)}
.layer-table-row:hover{background:var(--border)}
.layer-table-name{font-size:11px;font-family:var(--mono);color:var(--tx2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-table-disp{font-size:11px;color:var(--txm);flex-shrink:0}

/* ── Detail Panel ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:opacity var(--t);z-index:40}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-panel{position:fixed;top:0;right:0;bottom:0;width:472px;background:var(--bg-panel);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(100%);transition:transform .24s var(--ease),background var(--t),border-color var(--t);z-index:41;display:flex;flex-direction:column}
.detail-panel.open{transform:translateX(0)}

/* Detail Header */
.dp-hdr{padding:16px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;gap:10px}
.dp-hdr-info{flex:1;min-width:0}
.dp-top-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.dp-cat{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--txm)}
.dp-name{font-size:16px;font-weight:700;color:var(--tx);letter-spacing:-.3px;line-height:1.3;margin-bottom:3px}
.dp-id{font-size:11px;font-family:var(--mono);color:var(--txd);letter-spacing:-.1px}
.dp-close{width:28px;height:28px;border:1px solid var(--border);background:var(--bg-hover);border-radius:var(--r-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txm);font-size:14px;line-height:1;transition:all var(--t);flex-shrink:0}
.dp-close:hover{border-color:var(--border-med);color:var(--tx)}

/* Detail Body */
.dp-body{padding:16px 18px;flex:1}
.dp-section{margin-bottom:20px}
.dp-section-title{font-size:10px;font-weight:700;color:var(--txm);letter-spacing:.7px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.dp-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Stats */
.dp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.dp-stat{background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:8px 8px;text-align:center}
.dp-stat-label{font-size:9.5px;font-weight:500;color:var(--txm);margin-bottom:3px;letter-spacing:.1px}
.dp-stat-value{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--tx)}

/* Description */
.dp-desc-text{font-size:12.5px;color:var(--tx2);line-height:1.75}

/* Meta grid */
.dp-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dp-meta-item{background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:8px 11px}
.dp-meta-lbl{font-size:10px;font-weight:600;color:var(--txm);letter-spacing:.2px;margin-bottom:3px}
.dp-meta-val{font-size:12.5px;color:var(--tx);font-weight:500}

/* Chips */
.chips-row{display:flex;gap:5px;flex-wrap:wrap}
.tag-chip{font-size:11px;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:3px 8px;border-radius:3px;font-weight:500;transition:background var(--t)}
.metric-chip{font-size:11px;color:var(--tx2);background:var(--bg-hover);border:1px solid var(--border-med);padding:3px 9px;border-radius:3px;cursor:pointer;transition:background var(--t)}
.metric-chip:hover{background:var(--border);color:var(--tx)}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:260px;color:var(--txm);font-size:13px}
.empty-icon{font-size:26px;color:var(--txd);margin-bottom:12px}
</style>
</head>
<body>

<div class="toolbar">
  <a class="brand" href="#">
    <div class="brand-mark">AC</div>
    <span class="brand-name">资产目录</span>
    <span class="brand-tag">E-Commerce</span>
  </a>
  <div class="brand-sep"></div>
  <div class="srch">
    <span class="srch-ico">⌕</span>
    <input type="text" id="search-input" placeholder="搜索表名、描述、标签、负责人…" autocomplete="off">
  </div>
  <div class="tb-right">
    <span class="tb-count" id="count-label"></span>
    <div class="hdr-tabs">
      <button class="hdr-tab active" data-tab="assets">资产</button>
      <button class="hdr-tab" data-tab="layers">数据层</button>
    </div>
    <button class="ibtn" id="theme-btn" title="切换主题">◑</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div id="asset-list"></div>
    <div id="layer-grid" class="layer-grid" style="display:none"></div>
  </main>
</div>

<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div id="dp-content"></div>
</div>

/* ── Domain colors ── */
const CAT_DOTS = {
  '用户域': '#06b6d4',
  '订单域': '#f59e0b',
  '商品域': '#10b981',
  '营销域': '#ec4899',
  '物流域': '#8b5cf6',
  '财务域': '#ef4444',
  '流量域': '#3b82f6',
  '供应链域': '#78716c',
};

/* ── Layer metadata ── */
const LAYER_META = {
  ODS: { fullname: '原始数据层 (ODS)', color: '#d97706', bg: 'rgba(245,158,11,.1)', desc: '直接从业务系统同步的原始数据，包含全量和增量数据，是整个数据仓库的数据入口。数据质量和完整性由数据集成组负责保障。' },
  DWD: { fullname: '明细数据层 (DWD)', color: '#2563eb', bg: 'rgba(59,130,246,.1)', desc: '经过ETL清洗、标准化处理的明细数据，保留最细粒度的业务事件记录，是所有汇总层的数据源。' },
  DWS: { fullname: '汇总数据层 (DWS)', color: '#059669', bg: 'rgba(16,185,129,.1)', desc: '按业务主题轻度聚合的宽表，面向分析需求预计算常用指标，平衡查询性能与数据灵活性。' },
  ADS: { fullname: '应用数据层 (ADS)', color: '#7c3aed', bg: 'rgba(139,92,246,.1)', desc: '直接面向产品或业务报表的应用层表，高度聚合，查询性能最优，专为特定业务场景设计。' },
  DIM: { fullname: '维度数据层 (DIM)', color: '#6b7280', bg: 'rgba(107,114,128,.12)', desc: '业务实体的描述性维度表，如用户、商品、供应商等，为事实表提供维度关联，保证分析一致性。' },
};

/* ── State ── */
let currentDomain = 'all';
let currentLayer = 'all';
let searchQuery = '';
let currentTab = 'assets';
let activeId = null;

/* ── Filter ── */
function filterAssets() {
  const q = searchQuery.toLowerCase();
  return ASSETS.filter(a => {
    const domainOk = currentDomain === 'all' || a.category === currentDomain;
    const layerOk = currentLayer === 'all' || a.layer === currentLayer;
    if (!q) return domainOk && layerOk;
    return domainOk && layerOk && (
      a.display_name.toLowerCase().includes(q) ||
      a.name.toLowerCase().includes(q) ||
      a.description.toLowerCase().includes(q) ||
      a.tags.some(t => t.toLowerCase().includes(q)) ||
      a.category.toLowerCase().includes(q) ||
      a.layer.toLowerCase().includes(q) ||
      a.owner.toLowerCase().includes(q)
    );
  });
}

function selectDomain(d) {
  currentDomain = d;
  currentLayer = 'all';
  renderSidebar();
  renderList();
}

function selectLayer(l) {
  currentLayer = l;
  currentDomain = 'all';
  renderSidebar();
  renderList();
}

/* ── Helpers ── */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function layerBadge(layer) {
  return `<span class="layer-badge layer-${esc(layer)}">${esc(layer)}</span>`;
}

function sensBadge(s) {
  return `<span class="sens-badge sens-${esc(s)}">${esc(s)}</span>`;
}

function dotHtml(cat) {
  const color = CAT_DOTS[cat] || '#999';
  return `<span class="mr-dot" style="background:${color}"></span>`;
}

/* ── Sidebar counts ── */
function countByDomain(d) {
  return d === 'all' ? ASSETS.length : ASSETS.filter(a => a.category === d).length;
}
function countByLayer(l) {
  return l === 'all' ? ASSETS.length : ASSETS.filter(a => a.layer === l).length;
}

/* ── renderSidebar ── */
function renderSidebar() {
  const domains = ['用户域','订单域','商品域','营销域','物流域','财务域','流量域','供应链域'];
  const layers = ['ODS','DWD','DWS','ADS','DIM'];

  let html = `<span class="sb-label">业务域</span>`;

  // 全部资产
  const allActive = currentDomain === 'all' && currentLayer === 'all' ? 'active' : '';
  html += `<button class="nav-item ${allActive}" onclick="selectDomain('all')">
    <span class="nav-dot" style="background:var(--txd)"></span>
    <span class="nav-name">全部资产</span>
    <span class="nav-cnt">${ASSETS.length}</span>
  </button>`;

  html += `<div class="nav-divider"></div>`;

  domains.forEach(d => {
    const color = CAT_DOTS[d] || '#999';
    const active = currentDomain === d ? 'active' : '';
    html += `<button class="nav-item ${active}" onclick="selectDomain('${d}')">
      <span class="nav-dot" style="background:${color}"></span>
      <span class="nav-name">${esc(d)}</span>
      <span class="nav-cnt">${countByDomain(d)}</span>
    </button>`;
  });

  html += `<div class="nav-divider"></div>`;
  html += `<span class="sb-label">数据层</span>`;

  // 全部层级
  const layerAllActive = currentLayer === 'all' && currentDomain === 'all' ? 'active' : '';
  html += `<button class="nav-item ${layerAllActive}" onclick="selectLayer('all')">
    <span class="nav-sq" style="background:var(--txd)"></span>
    <span class="nav-name">全部层级</span>
    <span class="nav-cnt">${ASSETS.length}</span>
  </button>`;

  layers.forEach(l => {
    const meta = LAYER_META[l];
    const active = currentLayer === l ? 'active' : '';
    html += `<button class="nav-item ${active}" onclick="selectLayer('${l}')">
      <span class="nav-sq" style="background:${meta.color};border-radius:3px"></span>
      <span class="nav-name">${esc(l)}</span>
      <span class="nav-cnt">${countByLayer(l)}</span>
    </button>`;
  });

  document.getElementById('sidebar').innerHTML = html;
}

/* ── renderList ── */
function renderList() {
  const list = filterAssets();
  const container = document.getElementById('asset-list');

  // Update count
  const total = ASSETS.length;
  document.getElementById('count-label').textContent =
    list.length === total ? `共 ${total} 张表` : `${list.length} / ${total}`;

  if (list.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">□</div>没有匹配的数据资产</div>`;
    return;
  }

  let html = `<div class="mlist-hdr">
    <div class="mlist-hdr-cell">分类 / 层级</div>
    <div class="mlist-hdr-cell">表名称</div>
    <div class="mlist-hdr-cell" style="text-align:right">敏感级 / 负责人</div>
  </div>`;

  list.forEach(a => {
    const dotColor = CAT_DOTS[a.category] || '#999';
    const active = activeId === a.id ? 'active' : '';
    html += `<div class="mrow ${active}" onclick="openDetail('${esc(a.id)}')">
      <div class="mr-meta">
        <div class="mr-cat">
          <span class="mr-dot" style="background:${dotColor}"></span>
          ${esc(a.category)}
        </div>
        ${layerBadge(a.layer)}
      </div>
      <div class="mr-info">
        <div class="mr-name">${esc(a.display_name)}</div>
        <div class="mr-id">${esc(a.name)}</div>
        <div class="mr-desc">${esc(a.description)}</div>
      </div>
      <div class="mr-right">
        <div class="mr-right-top">
          ${sensBadge(a.sensitivity)}
        </div>
        <div class="mr-owner">${esc(a.owner)}</div>
        <span class="freq-chip">更新: ${esc(a.update_freq)}</span>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

/* ── renderLayerGrid ── */
function renderLayerGrid() {
  const layers = ['ODS','DWD','DWS','ADS','DIM'];
  let html = '';

  layers.forEach(l => {
    const meta = LAYER_META[l];
    const tables = ASSETS.filter(a => a.layer === l);
    html += `<div class="layer-card">
      <div class="layer-card-top">
        <span class="layer-card-badge layer-${l}" style="background:${meta.bg};color:${meta.color}">${l}</span>
        <span class="layer-card-count">${tables.length} 张表</span>
        <span class="layer-card-label">· ${meta.fullname.split('(')[1].replace(')','')}</span>
      </div>
      <div class="layer-card-fullname">${meta.fullname}</div>
      <div class="layer-card-desc">${esc(meta.desc)}</div>
      <div class="layer-card-tables">
        ${tables.map(t => {
          const dotColor = CAT_DOTS[t.category] || '#999';
          return `<div class="layer-table-row" onclick="openDetail('${esc(t.id)}'); switchToAssetsTab()">
            <span style="width:6px;height:6px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>
            <span class="layer-table-name">${esc(t.name)}</span>
            <span class="layer-table-disp">${esc(t.display_name)}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  document.getElementById('layer-grid').innerHTML = html;
}

function switchToAssetsTab() {
  // Called when clicking a table row in layer overview to switch back to assets tab
  setTimeout(() => {
    currentTab = 'assets';
    document.querySelectorAll('.hdr-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === 'assets');
    });
    document.getElementById('asset-list').style.display = '';
    document.getElementById('layer-grid').style.display = 'none';
    document.getElementById('sidebar').style.display = '';
  }, 50);
}

/* ── openDetail ── */
function openDetail(id) {
  const a = ASSETS.find(x => x.id === id);
  if (!a) return;
  activeId = id;

  // Update active row
  document.querySelectorAll('.mrow').forEach(r => {
    r.classList.toggle('active', r.getAttribute('onclick') && r.getAttribute('onclick').includes(`'${id}'`));
  });

  const dotColor = CAT_DOTS[a.category] || '#999';
  const relMetrics = RELATED_METRICS[a.id] || [];

  let html = `<div class="dp-hdr">
    <div class="dp-hdr-info">
      <div class="dp-top-row">
        <div class="dp-cat">
          <span style="width:7px;height:7px;border-radius:50%;background:${dotColor};flex-shrink:0;display:inline-block"></span>
          ${esc(a.category)}
        </div>
        ${layerBadge(a.layer)}
        ${sensBadge(a.sensitivity)}
      </div>
      <div class="dp-name">${esc(a.display_name)}</div>
      <div class="dp-id">${esc(a.name)}</div>
    </div>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="dp-body">
    <div class="dp-stats">
      <div class="dp-stat">
        <div class="dp-stat-label">行数规模</div>
        <div class="dp-stat-value" style="font-size:11px">${esc(String(a.row_count))}</div>
      </div>
      <div class="dp-stat">
        <div class="dp-stat-label">字段数</div>
        <div class="dp-stat-value">${esc(String(a.field_count))}</div>
      </div>
      <div class="dp-stat">
        <div class="dp-stat-label">更新频率</div>
        <div class="dp-stat-value" style="font-size:11px">${esc(a.update_freq)}</div>
      </div>
      <div class="dp-stat">
        <div class="dp-stat-label">数据状态</div>
        <div class="dp-stat-value" style="font-size:11px">${esc(a.status)}</div>
      </div>
    </div>

    <div class="dp-section">
      <div class="dp-section-title">数据描述</div>
      <div class="dp-desc-text">${esc(a.description)}</div>
    </div>`;

  if (relMetrics.length > 0) {
    html += `<div class="dp-section">
      <div class="dp-section-title">关联指标</div>
      <div class="chips-row">
        ${relMetrics.map(m => `<span class="metric-chip">${esc(m)}</span>`).join('')}
      </div>
    </div>`;
  }

  html += `<div class="dp-section">
      <div class="dp-section-title">负责信息</div>
      <div class="dp-meta-grid">
        <div class="dp-meta-item">
          <div class="dp-meta-lbl">负责团队</div>
          <div class="dp-meta-val">${esc(a.owner)}</div>
        </div>
        <div class="dp-meta-item">
          <div class="dp-meta-lbl">更新频率</div>
          <div class="dp-meta-val">${esc(a.update_freq)}</div>
        </div>
        <div class="dp-meta-item">
          <div class="dp-meta-lbl">数据状态</div>
          <div class="dp-meta-val">${esc(a.status)}</div>
        </div>
        <div class="dp-meta-item">
          <div class="dp-meta-lbl">敏感级别</div>
          <div class="dp-meta-val">${esc(a.sensitivity)}</div>
        </div>
      </div>
    </div>

    <div class="dp-section">
      <div class="dp-section-title">标签</div>
      <div class="chips-row">
        ${a.tags.map(t => `<span class="tag-chip">${esc(t)}</span>`).join('')}
      </div>
    </div>
  </div>`;

  document.getElementById('dp-content').innerHTML = html;
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  activeId = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').classList.remove('open');
  document.querySelectorAll('.mrow.active').forEach(r => r.classList.remove('active'));
}

/* ── Theme toggle ── */
document.getElementById('theme-btn').addEventListener('click', () => {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

/* ── Tab switching ── */
document.querySelectorAll('.hdr-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.hdr-tab').forEach(b => b.classList.toggle('active', b === btn));

    const isAssets = currentTab === 'assets';
    document.getElementById('asset-list').style.display = isAssets ? '' : 'none';
    document.getElementById('layer-grid').style.display = isAssets ? 'none' : '';
    document.getElementById('sidebar').style.display = isAssets ? '' : 'none';

    if (!isAssets) {
      renderLayerGrid();
    }
    closeDetail();
  });
});

/* ── Search ── */
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderList();
});

/* ── PostMessage ── */
window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'openAsset') {
    const id = e.data.id;
    if (ASSETS.find(a => a.id === id)) {
      // Switch to assets tab if needed
      if (currentTab !== 'assets') {
        currentTab = 'assets';
        document.querySelectorAll('.hdr-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === 'assets'));
        document.getElementById('asset-list').style.display = '';
        document.getElementById('layer-grid').style.display = 'none';
        document.getElementById('sidebar').style.display = '';
      }
      openDetail(id);
    }
  }
});

try { window.parent.postMessage({ type: 'assetCatalogReady' }, '*'); } catch(e) {}

/* ── Init ── */
renderSidebar();
renderList();
</script>
