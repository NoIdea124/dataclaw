/* ── Tag-select (chip picker) ── */
const TAG_DEFS = {
  'dim-type':[
    {v:'categorical',l:'枚举型',c:'tc-cat'},
    {v:'numerical',  l:'数值型',c:'tc-num'},
    {v:'boolean',    l:'布尔型',c:'tc-bool'}
  ],
  'met-unit':[
    {v:'',    l:'—',   c:'tc-empty'},
    {v:'数值', l:'数值', c:'tc-unit'},{v:'%',   l:'%',   c:'tc-unit'},
    {v:'元',  l:'元',  c:'tc-unit'},{v:'万元', l:'万元', c:'tc-unit'},{v:'亿元', l:'亿元', c:'tc-unit'},
    {v:'天',  l:'天',  c:'tc-unit'},{v:'小时', l:'小时', c:'tc-unit'},{v:'分',  l:'分',  c:'tc-unit'},{v:'秒',  l:'秒',  c:'tc-unit'},
    {v:'次',  l:'次',  c:'tc-unit'},{v:'人',  l:'人',  c:'tc-unit'},{v:'个',  l:'个',  c:'tc-unit'},{v:'件',  l:'件',  c:'tc-unit'},{v:'笔',  l:'笔',  c:'tc-unit'}
  ],
  'met-dir':[
    {v:'up',  l:'正向↑',c:'tc-up'},
    {v:'down',l:'负向↓',c:'tc-down'}
  ]
};
function renderTagSel(id, kind, val, tbl, rowIdx, field, readonly) {
  const defs = TAG_DEFS[kind] || [];
  const def = defs.find(d => d.v === val) || defs[0] || {l:val||'—',c:'tc-empty'};
  if (readonly) return `<div class="tag-sel ro"><span class="tag-chip ${def.c}">${esc(def.l)}</span></div>`;
  const opts = defs.map(d =>
    `<div class="tag-opt${d.v===val?' cur':''}" data-val="${esc(d.v)}"
      onmousedown="event.preventDefault();pickTagVal('${id}','${kind}','${tbl}',${rowIdx},'${field}','${d.v.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">
      <span class="tag-chip ${d.c}">${esc(d.l)}</span>
    </div>`).join('');
  return `<div class="tag-sel" id="${id}" data-kind="${kind}"
    onclick="event.stopPropagation();toggleTagSel('${id}')">
    <span class="tag-chip ${def.c}">${esc(def.l)}<span class="tag-arr">▾</span></span>
    <div class="tag-dd" id="${id}-dd">${opts}</div>
  </div>`;
}
function toggleTagSel(id) {
  const dd = document.getElementById(id+'-dd');
  if (!dd) return;
  const open = dd.classList.contains('open');
  document.querySelectorAll('.tag-dd.open').forEach(d => d.classList.remove('open'));
  if (!open) dd.classList.add('open');
}
function pickTagVal(id, kind, tbl, rowIdx, field, value) {
  if (tbl==='dim') updateDimRow(rowIdx, field, value);
  else updateMetricRow(rowIdx, field, value);
  const dd = document.getElementById(id+'-dd');
  if (dd) dd.classList.remove('open');
  const sel = document.getElementById(id);
  if (!sel) return;
  const defs = TAG_DEFS[kind]||[];
  const def = defs.find(d=>d.v===value)||{l:value||'—',c:'tc-empty'};
  const chip = sel.querySelector(':scope>.tag-chip');
  if (chip) { chip.className=`tag-chip ${def.c}`; chip.innerHTML=`${esc(def.l)}<span class="tag-arr">▾</span>`; }
  sel.querySelectorAll('.tag-opt').forEach(o=>o.classList.toggle('cur', o.dataset.val===value));
}
document.addEventListener('click', () => document.querySelectorAll('.tag-dd.open').forEach(d=>d.classList.remove('open')));

/* ── Dim table (spreadsheet) ── */
function renderDimTable(showSrc, readonly) {
  const CATS = Object.keys(CAT_DOTS);
  const rows = (reqDraft.dimRows || []).filter(r => r.type !== 'time');
  const defW = _defaultDimW(showSrc);
  if (dimColWidths.length !== defW.length) dimColWidths = [...defW];
  const ro = readonly ? 'readonly disabled' : '';
  const hcols = ['维度名称','维度类型','说明', ...(showSrc?['来源表']:[]), ''];

  const cg = '<colgroup>' + dimColWidths.map(w => `<col style="width:${w}px">`).join('') + '</colgroup>';
  const thead = hcols.map((h, i) => {
    const rzHandle = (i < hcols.length - 1 && !readonly)
      ? `<div class="col-rz" onmousedown="startColResize(event,'dim-sp-tbl',${i})"></div>` : '';
    return `<th>${esc(h)}${rzHandle}</th>`;
  }).join('');

  const tbody = rows.map((row, idx) => {
    const srcCell = showSrc ? `<td>
        <input class="ti" placeholder="表名" value="${esc(row.source_table)}" ${ro}
          onchange="updateDimRow(${idx},'source_table',this.value)">
      </td>` : '';
    const delCell = `<td class="row-del-td">${readonly?'':'<button class="tbl-del" onclick="deleteDimRow('+idx+')" title="删除">✕</button>'}</td>`;

    const nameCell = readonly
      ? `<td><div class="tc" style="pointer-events:none">${row.display_name||''}</div></td>`
      : `<td style="position:relative">
          <div class="tc" contenteditable="true"
            data-ph="如：商品类目" data-dim="${idx}" data-tbl="dim" data-field="display_name"
            oninput="updateDimRow(${idx},'display_name',this.innerHTML);showDimAc(${idx},pt(this.innerHTML))"
            onfocus="showFmtToolbar(this)"
            onblur="hideFmtToolbar(event.relatedTarget);setTimeout(()=>{var d=document.getElementById('dim-ac-${idx}');if(d)d.style.display='none'},150)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey)event.preventDefault()"
            >${row.display_name||''}</div>
          <div class="ac-dd" id="dim-ac-${idx}" style="display:none"></div>
        </td>`;

    const descCell = readonly
      ? `<td><div class="tc" style="pointer-events:none">${row.description||''}</div></td>`
      : `<td>
          <div class="tc" contenteditable="true"
            data-ph="枚举值或说明" data-dim="${idx}" data-tbl="dim" data-field="description"
            oninput="updateDimRow(${idx},'description',this.innerHTML)"
            onfocus="showFmtToolbar(this)"
            onblur="hideFmtToolbar(event.relatedTarget)"
            >${row.description||''}</div>
        </td>`;

    return `<tr>
      ${nameCell}
      <td>${renderTagSel('dim-type-'+idx,'dim-type',row.type||'categorical','dim',idx,'type',readonly)}</td>
      ${descCell}
      ${srcCell}
      ${delCell}
    </tr>`;
  }).join('');

  return `<table class="meta-tbl" id="dim-sp-tbl">${cg}<thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

/* ── Metric table (spreadsheet) ── */
function renderMetricTable(showSrc, readonly) {
  const CATS = Object.keys(CAT_DOTS);
  const rows = reqDraft.metricRows || [];
  const defW = _defaultMetW(showSrc);
  if (metricColWidths.length !== defW.length) metricColWidths = [...defW];
  const ro = readonly ? 'readonly disabled' : '';
  const hcols = ['指标名称','单位','正负向','指标说明','可拆解维度',
    ...(showSrc?['来源表']:[]), ''];

  const cg = '<colgroup>' + metricColWidths.map(w => `<col style="width:${w}px">`).join('') + '</colgroup>';
  const thead = hcols.map((h, i) => {
    const rzHandle = (i < hcols.length - 1 && !readonly)
      ? `<div class="col-rz" onmousedown="startColResize(event,'metric-sp-tbl',${i})"></div>` : '';
    return `<th>${esc(h)}${rzHandle}</th>`;
  }).join('');

  const availDimNames = (reqDraft.dimRows||[]).filter(d=>pt(d.display_name).trim()).map(d=>pt(d.display_name));

  const tbody = rows.map((row, idx) => {
    const srcCell = showSrc ? `<td>
        <input class="ti" placeholder="表名" value="${esc(row.source_table)}" ${ro}
          onchange="updateMetricRow(${idx},'source_table',this.value)">
      </td>` : '';
    const delCell = `<td class="row-del-td">${readonly?'':'<button class="tbl-del" onclick="deleteMetricRow('+idx+')" title="删除">✕</button>'}</td>`;

    // display_name: contenteditable with autocomplete
    const nameCell = readonly
      ? `<td><div class="tc" style="pointer-events:none">${row.display_name||''}</div></td>`
      : `<td style="position:relative">
          <div class="tc" contenteditable="true"
            data-ph="指标名称" data-metric="${idx}" data-tbl="metric" data-field="display_name"
            oninput="updateMetricRow(${idx},'display_name',this.innerHTML);showMetricAc(${idx},pt(this.innerHTML))"
            onfocus="showFmtToolbar(this)"
            onblur="hideFmtToolbar(event.relatedTarget);setTimeout(()=>{var d=document.getElementById('metric-ac-${idx}');if(d)d.style.display='none'},150)"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey)event.preventDefault()"
            >${row.display_name||''}</div>
          <div class="ac-dd" id="metric-ac-${idx}" style="display:none"></div>
        </td>`;

    // description: contenteditable with rich text
    const descCell = readonly
      ? `<td><div class="tc" style="pointer-events:none">${row.description||''}</div></td>`
      : `<td>
          <div class="tc" contenteditable="true"
            data-ph="含义说明" data-metric="${idx}" data-tbl="metric" data-field="description"
            oninput="updateMetricRow(${idx},'description',this.innerHTML)"
            onfocus="showFmtToolbar(this)"
            onblur="hideFmtToolbar(event.relatedTarget)"
            >${row.description||''}</div>
        </td>`;

    // dim picker
    const selDims = row.available_dims || [];
    const dimChips = selDims.map(d =>
      readonly
        ? `<span class="dimpick-chip" style="cursor:default">${esc(d)}</span>`
        : `<span class="dimpick-chip" onmousedown="removeMetricDim(${idx},'${d.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${esc(d)} ×</span>`
    ).join('');
    const dimPickerCell = readonly
      ? `<td style="padding:3px 6px"><div class="dimpick-wrap">${dimChips||'<span style="color:var(--txd);font-size:11px">—</span>'}</div></td>`
      : `<td style="position:relative;padding:3px 4px">
          <div class="dimpick-wrap" id="dimpick-${idx}">
            ${dimChips}
            <button class="dimpick-btn" onmousedown="toggleDimPickerDd(${idx})">+ 维度</button>
          </div>
          <div class="dimpick-dd" id="dimpick-dd-${idx}" style="display:none">
            ${availDimNames.length
              ? availDimNames.map(d => `<div class="dimpick-opt${selDims.includes(d)?' selected':''}" onmousedown="toggleMetricDim(${idx},'${d.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"><span style="width:14px;display:inline-block">${selDims.includes(d)?'✓':''}</span>${esc(d)}</div>`).join('')
              : '<div style="padding:8px;font-size:12px;color:var(--txm)">先录入维度</div>'}
          </div>
        </td>`;

    return `<tr>
      ${nameCell}
      <td>${renderTagSel('met-unit-'+idx,'met-unit',row.unit||'','met',idx,'unit',readonly)}</td>
      <td>${renderTagSel('met-dir-'+idx,'met-dir',row.direction||'up','met',idx,'direction',readonly)}</td>
      ${descCell}
      ${dimPickerCell}
      ${srcCell}
      ${delCell}
    </tr>`;
  }).join('');

  return `<table class="meta-tbl" id="metric-sp-tbl">${cg}<thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

/* ── Row management ── */
function updateDimRow(idx, field, value) {
  if (reqDraft && reqDraft.dimRows && reqDraft.dimRows[idx] !== undefined) reqDraft.dimRows[idx][field] = value;
}
function updateMetricRow(idx, field, value) {
  if (reqDraft && reqDraft.metricRows && reqDraft.metricRows[idx] !== undefined) reqDraft.metricRows[idx][field] = value;
}
function addDimRow() {
  if (!reqDraft) return;
  reqDraft.dimRows.push(emptyDimRow());
  const w = document.getElementById('dim-tbl-wrap');
  if (w) w.innerHTML = renderDimTable(false, false);
}
function deleteDimRow(idx) {
  if (!reqDraft || reqDraft.dimRows.length <= 1) return;
  reqDraft.dimRows.splice(idx, 1);
  const w = document.getElementById('dim-tbl-wrap');

}
function addMetricRow() {

  reqDraft.metricRows.push(emptyMetricRow());
  const w = document.getElementById('metric-tbl-wrap');

}
function deleteMetricRow(idx) {

/* ── Autocomplete ── */
function showDimAc(idx, value) {
  const dd = document.getElementById('dim-ac-' + idx);
  if (!dd) return;
  const v = pt(value).trim();
  if (!v) { dd.style.display = 'none'; return; }
  const q = v.toLowerCase();
  const sug = DIMENSIONS.filter(d =>
    d.display_name.toLowerCase().includes(q) || d.name.toLowerCase().includes(q)
  ).slice(0, 6);
  if (!sug.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = sug.map(d =>
    `<div class="ac-item" onmousedown="pickDimSuggestion(${idx},'${d.display_name.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${d.type||'categorical'}')">
      <span>${esc(d.display_name)}</span><span style="color:var(--txm);font-size:10.5px">${esc(d.type||'')}</span>
    </div>`
  ).join('');
  dd.style.display = 'block';
}
function pickDimSuggestion(idx, displayName, type) {
  if (reqDraft && reqDraft.dimRows && reqDraft.dimRows[idx]) {
    reqDraft.dimRows[idx].display_name = displayName;
    if (type) reqDraft.dimRows[idx].type = type;
  }
  // Re-render to update type select + refresh cell content
  const showSrc = ['in_dev','testing'].includes(reqDraft.status);
  const w = document.getElementById('dim-tbl-wrap');
  if (w) w.innerHTML = renderDimTable(showSrc, false);
}
function showMetricAc(idx, value) {
  const dd = document.getElementById('metric-ac-' + idx);
  if (!dd) return;
  const v = pt(value).trim();
  if (!v) { dd.style.display = 'none'; return; }
  const q = v.toLowerCase();
  const sug = METRICS.filter(m =>
    m.display_name.toLowerCase().includes(q) || m.name.toLowerCase().includes(q)
  ).slice(0, 6);
  if (!sug.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = sug.map(m =>
    `<div class="ac-item" onmousedown="pickMetricSuggestion(${idx},'${m.display_name.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${m.category||''}','${m.unit||''}','${m.direction||'up'}')">
      <span>${esc(m.display_name)}</span><span style="color:var(--txm);font-size:10.5px">${esc(m.category||'')}</span>
    </div>`
  ).join('');
  dd.style.display = 'block';
}
function pickMetricSuggestion(idx, displayName, category, unit, direction) {
  if (reqDraft && reqDraft.metricRows && reqDraft.metricRows[idx]) {
    const row = reqDraft.metricRows[idx];
    row.display_name = displayName;
    if (category) row.category = category;
    if (unit) row.unit = unit;
    if (direction) row.direction = direction;
  }
  // Re-render to reflect filled-in selects
  const w = document.getElementById('metric-tbl-wrap');
  if (w) w.innerHTML = renderMetricTable(['in_dev','testing'].includes(reqDraft.status), false);
}

/* ── Dim picker for metric rows ── */
function getAllAvailableDimNames() {
  return (reqDraft && reqDraft.dimRows || []).map(d => pt(d.display_name).trim()).filter(Boolean);
}
function toggleDimPickerDd(idx) {
  const dd = document.getElementById('dimpick-dd-' + idx);
  if (!dd) return;
  if (dd.style.display !== 'none') { dd.style.display = 'none'; return; }
  const dims = getAllAvailableDimNames();
  const row = reqDraft && reqDraft.metricRows && reqDraft.metricRows[idx];
  if (!row) return;
  const sel = row.available_dims || [];
  dd.innerHTML = dims.length
    ? dims.map(d => `<div class="dimpick-opt${sel.includes(d)?' selected':''}" onmousedown="toggleMetricDim(${idx},'${d.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"><span style="width:14px;display:inline-block">${sel.includes(d)?'✓':''}</span>${esc(d)}</div>`).join('')
    : '<div style="padding:8px;font-size:12px;color:var(--txm)">请先录入维度</div>';
  dd.style.display = 'block';
}
function toggleMetricDim(metricIdx, dimName) {
  if (!reqDraft || !reqDraft.metricRows || !reqDraft.metricRows[metricIdx]) return;
  const dims = reqDraft.metricRows[metricIdx].available_dims;
  const i = dims.indexOf(dimName);
  if (i >= 0) dims.splice(i, 1); else dims.push(dimName);
  const showSrc = ['in_dev','testing'].includes(reqDraft.status);
  const w = document.getElementById('metric-tbl-wrap');
  if (w) w.innerHTML = renderMetricTable(showSrc, false);
  // Reopen picker to allow continued selection
  setTimeout(() => toggleDimPickerDd2(metricIdx), 0);
}
function toggleDimPickerDd2(idx) {
  // Force-open (non-toggle) version used after re-render
  const dd = document.getElementById('dimpick-dd-' + idx);
  if (!dd) return;
  const dims = getAllAvailableDimNames();
  const row = reqDraft && reqDraft.metricRows && reqDraft.metricRows[idx];
  if (!row) return;
  const sel = row.available_dims || [];
  dd.innerHTML = dims.length
    ? dims.map(d => `<div class="dimpick-opt${sel.includes(d)?' selected':''}" onmousedown="toggleMetricDim(${idx},'${d.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"><span style="width:14px;display:inline-block">${sel.includes(d)?'✓':''}</span>${esc(d)}</div>`).join('')
    : '<div style="padding:8px;font-size:12px;color:var(--txm)">请先录入维度</div>';
  dd.style.display = 'block';
}
function removeMetricDim(metricIdx, dimName) {
  toggleMetricDim(metricIdx, dimName);
}

  return `<button class="btn-sec" onclick="closeReqPanel()">关闭</button>
    <button class="btn-pri ml-auto" onclick="submitForReview()">提交审核</button>`;
}

  const canSubmit = reqAiState && reqAiState.step===1 && reqAiState.status==='pass';
  const isFail = reqAiState && reqAiState.step===1 && reqAiState.status==='fail';

    <button class="btn-pri ml-auto" onclick="submitToDev()" ${canSubmit?'':'disabled'}>提交开发</button>`;

  return `<button class="btn-sec" onclick="closeReqPanel()">关闭</button>
    <button class="btn-pri ml-auto" onclick="submitForTesting()">提交数据测试</button>`;
}

  const aiHtml = reqAiState && reqAiState.step===2 ? renderAiBox(reqAiState) : `
    <div class="ai-box checking" style="margin-top:16px">
      <div class="ai-box-row">⏳ AI 数据测试中…</div>

function renderTestingFooter() {
  const canPublish = reqAiState && reqAiState.step===2 && reqAiState.status==='pass';
  const testFail = reqAiState && reqAiState.step===2 && reqAiState.status==='fail';
  const aiSvg = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M5.5 8l1.8 1.8 3.2-3.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  return `${testFail ? `<button class="btn-sec" onclick="backToInDev()">← 返回修改</button>` : `<button class="btn-sec" onclick="closeReqPanel()">关闭</button>`}
    <button class="btn-ai" onclick="runAiTest()">${aiSvg} 重新测试</button>
    <button class="btn-pri ml-auto" onclick="publishTask()" ${canPublish?'':'disabled'}>发布任务</button>`;
}

function renderAiBox(state) {
  if (state.status === 'checking') return `
    <div class="ai-box checking">
      <div class="ai-box-row">⏳ ${state.step===1?'AI 审核中…':'AI 测试中…'}</div>
      <div class="ai-box-msg">正在检查${state.step===1?'元信息完整性':'数据源配置'}，请稍候</div>
    </div>`;
  const isPass = state.status === 'pass';
  const itemsHtml = state.items.length
    ? state.items.map(it => `<div class="ai-item ${it.ok?'ok':'err'}">${esc(it.text)}</div>`).join('')
    : '';
  return `<div class="ai-box ${isPass?'pass':'fail'}">
    <div class="ai-box-row">${isPass?'✅':'❌'} ${state.step===1?(isPass?'审核通过':'审核未通过'):(isPass?'测试通过':'测试未通过')}</div>
    <div class="ai-box-msg">${esc(state.message)}</div>
    ${itemsHtml}
  </div>`;
}

function runAiReview() {
  reqAiState = { step:1, status:'checking', message:'', items:[] };
  renderReqEditPage();
  setTimeout(() => {
    const r = reqDraft;
    const items = [];
    if (!r.title) items.push({ok:false, text:'需求标题不能为空'});
    else items.push({ok:true, text:'需求标题已填写'});
    if (!r.background) items.push({ok:false, text:'需求背景不能为空'});
    else items.push({ok:true, text:'需求背景已填写'});
    if (!r.benefit) items.push({ok:false, text:'需求收益不能为空'});
    else items.push({ok:true, text:'需求收益已填写'});
    if (!r.requester) items.push({ok:false, text:'业务负责人不能为空'});
    else items.push({ok:true, text:`业务负责人：${r.requester}`});
    if (!r.assignee) items.push({ok:false, text:'技术负责人不能为空'});
    else items.push({ok:true, text:`技术负责人：${r.assignee}`});
    const dimRows = r.dimRows || [];
    const metricRows = r.metricRows || [];
    if (!dimRows.length || dimRows.every(row => !pt(row.display_name).trim())) {
      items.push({ok:false, text:'至少需要填写一条维度元信息'});
    } else {
      dimRows.forEach((row, i) => {
        const n = pt(row.display_name).trim();
        if (!n) items.push({ok:false, text:`维度第${i+1}行：名称不能为空`});
        else items.push({ok:true, text:`维度「${n}」信息完整`});
      });
    }
    if (!metricRows.length || metricRows.every(row => !pt(row.display_name).trim())) {
      items.push({ok:false, text:'至少需要填写一条指标元信息'});
    } else {
      metricRows.forEach((row, i) => {
        const n = pt(row.display_name).trim();
        if (!n) items.push({ok:false, text:`指标第${i+1}行：名称不能为空`});
        else items.push({ok:true, text:`指标「${n}」元信息完整`});
      });
    }
    const passed = items.every(it => it.ok);
    reqAiState = { step:1, status: passed?'pass':'fail',
      message: passed ? '所有字段验证通过，可提交开发' : '请补全以下问题后重新审核', items };
    renderReqEditPage();
  }, 900);
}

function runAiTest() {
  reqAiState = { step:2, status:'checking', message:'', items:[] };
  renderReqEditPage();
  setTimeout(() => {
    const items = [];
    (reqDraft.dimRows || []).forEach((row, i) => {
      const n = pt(row.display_name).trim() || `维度第${i+1}条`;
      if (!row.source_table) items.push({ok:false, text:`${n}：来源表未填写`});
      else if (!row.source_table.includes('_')) items.push({ok:false, text:`${n}：表名格式不规范（建议 层级_主题_粒度）`});
      else items.push({ok:true, text:`${n} → ${row.source_table} 验证通过`});
    });
    (reqDraft.metricRows || []).forEach((row, i) => {
      const n = pt(row.display_name).trim() || `指标第${i+1}条`;
      if (!row.source_table) items.push({ok:false, text:`${n}：来源表未填写`});
      else if (!row.source_table.includes('_')) items.push({ok:false, text:`${n}：表名格式不规范（建议 层级_主题_粒度）`});
      else items.push({ok:true, text:`${n} → ${row.source_table} 验证通过`});
      if (!row.unit) items.push({ok:false, text:`${n}：单位未填写`});
    });
    const passed = items.every(it => it.ok);
    reqAiState = { step:2, status: passed?'pass':'fail',
      message: passed ? '数据源配置验证通过，指标/维度即将进入资产库' : '请补充以下信息后重新测试', items };
    renderReqEditPage();
  }, 1100);
}

function submitToDev() {
  if (!reqDraft || !reqAiState || reqAiState.step!==1 || reqAiState.status!=='pass') return;
  reqDraft.status = 'in_dev';
  reqDraft.step1Review = { passed:true, feedback:reqAiState.message };
  const idx = reqTasks.findIndex(t => t.id === reqDraft.id);
  if (idx >= 0) reqTasks[idx] = JSON.parse(JSON.stringify(reqDraft));
  reqAiState = null;
  renderReqView();
  renderReqEditPage();
}

function publishTask() {
  if (!reqDraft || !reqAiState || reqAiState.step!==2 || reqAiState.status!=='pass') return;
  reqDraft.status = 'published';
  reqDraft.step2Test = { passed:true, feedback:reqAiState.message };
  // Register dimensions first
  (reqDraft.dimRows || []).forEach(row => {
    const dname = pt(row.display_name).trim();
    if (!dname) return;
    const id = dname.toLowerCase().replace(/\s+/g,'_').replace(/[^\w_]/g,'') || ('dim_' + Date.now().toString(36));
    if (!DIMENSIONS.find(d => d.display_name === dname)) {
      DIMENSIONS.push({ id, name:dname, display_name:dname,
        type:row.type||'categorical',
        description:pt(row.description)||`来自需求任务 "${reqDraft.title}"`,
        values_example:[], cardinality:'未知' });
    }
  });
  // Register metrics, mapping available_dims names to dim IDs
  (reqDraft.metricRows || []).forEach(row => {
    const dname = pt(row.display_name).trim();
    if (!dname) return;
    const id = dname.toLowerCase().replace(/\s+/g,'_').replace(/[^\w_]/g,'') || ('met_' + Date.now().toString(36));
    if (!METRICS.find(m => m.display_name === dname)) {
      const availDimIds = (row.available_dims || []).map(dname => {
        const d = DIMENSIONS.find(d => d.display_name === dname);
        return d ? d.id : dname;
      });
      METRICS.push({ id, name:id, display_name:dname,
        category:row.category||'其他', unit:row.unit||'—', formula:'待完善',
        description:pt(row.description)||`来自需求任务 "${reqDraft.title}"`,
        source_table:row.source_table, direction:row.direction||'up',
        update_freq:row.update_freq||'天', owner:reqDraft.assignee||'',
        tags:[row.category||'自定义'],
        available_dimensions:availDimIds.length ? availDimIds : ['date'],
        sim:{base:100,variance:.10,trend:.02} });
    }
  });
  const idx = reqTasks.findIndex(t => t.id === reqDraft.id);
  if (idx >= 0) reqTasks[idx] = JSON.parse(JSON.stringify(reqDraft));
  reqAiState = null;
  renderReqView();
  renderReqEditPage();
  if (currentTab === 'search' && currentSubTab === 'metrics') { renderSidebar(); renderList(); }
}

/* ── Init ── */
checkAuth().then(() => {
  const hash = location.hash.replace('#', '');
  if (hash.startsWith('request:')) {
    const reqId = hash.slice('request:'.length);
    switchTab('request');
    setTimeout(() => openReqEdit(reqId), 50);
  } else if (hash === 'assets' || hash === 'request') {
    switchTab(hash);
  } else {
    renderSidebar();
    renderList();
  }
});

/* ── PostMessage from DataClaw parent ── */
window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'openMetric') {
    const id = e.data.id;
    if (currentTab !== 'search') switchTab('search');
    if (METRICS.find(m => m.id === id)) openDetail(id);
  }
  if (e.data.type === 'switchTab') {
    const tab = e.data.tab;
    if (tab === 'search' || tab === 'request' || tab === 'assets') switchTab(tab);
  }
});
try { window.parent.postMessage({ type: 'assetLibReady' }, '*'); } catch(e) {}
