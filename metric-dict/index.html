<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>资产库 — DataClaw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ── */
:root {
  --bg:         #ffffff;
  --bg-panel:   #ffffff;
  --bg-card:    #ffffff;
  --bg-hover:   #f4f4f4;
  --bg-hdr:     #f8f8f8;
  --border:     #e8e8e8;
  --border-med: #cccccc;
  --accent:     #111111;
  --tx:         #0d0d0d;
  --tx2:        #555555;
  --txm:        #999999;
  --txd:        #cccccc;
  --sh-xs: 0 1px 2px rgba(0,0,0,.06);
  --sh-sm: 0 1px 6px rgba(0,0,0,.09);
  --sh-md: 0 2px 14px rgba(0,0,0,.10);
  --r:    12px;
  --r-sm:  8px;
  --r-xs:  5px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
  --ease: cubic-bezier(.16,1,.3,1);
  --t:    .16s;
}
[data-theme="dark"] {
  --bg:         #0a0a0a;
  --bg-panel:   #111111;
  --bg-card:    #181818;
  --bg-hover:   #202020;
  --bg-hdr:     #161616;
  --border:     #252525;
  --border-med: #333333;
  --accent:     #d8d8d8;
  --tx:         #efefef;
  --tx2:        #aaaaaa;
  --txm:        #666666;
  --txd:        #333333;
  --sh-xs: 0 1px 2px rgba(0,0,0,.45);
  --sh-sm: 0 1px 6px rgba(0,0,0,.55);
  --sh-md: 0 2px 14px rgba(0,0,0,.6);
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-feature-settings:'ss01','cv01';background:var(--bg);color:var(--tx);display:flex;flex-direction:column;height:100vh;-webkit-font-smoothing:antialiased;transition:background var(--t),color var(--t)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--txm)}

/* ── Toolbar ── */
.toolbar{height:52px;padding:0 18px;display:flex;align-items:center;gap:12px;background:var(--bg-panel);border-bottom:1px solid var(--border);flex-shrink:0;transition:background var(--t),border-color var(--t)}
.brand{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none}
.brand-mark{width:30px;height:30px;border-radius:8px;background:#111;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:800;color:#fff;font-family:var(--mono);letter-spacing:-.5px;user-select:none}
.brand-name{font-size:14.5px;font-weight:700;letter-spacing:-.3px;color:var(--tx);white-space:nowrap;transition:color var(--t)}
.brand-tag{font-size:10px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:2px 6px;border-radius:3px;white-space:nowrap}
.brand-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.srch{position:relative;flex-shrink:0;width:200px}
.srch input{width:100%;height:32px;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:0 10px 0 28px;color:var(--tx);font-size:12.5px;font-family:var(--font);outline:none;transition:border-color var(--t),background var(--t)}
.srch input:focus{background:var(--bg-card);border-color:var(--border-med)}
.srch input::placeholder{color:var(--txm)}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--txm);pointer-events:none;font-size:12px;line-height:1}
/* ── Top nav (查指标 / 提需求) ── */
.top-nav{display:flex;align-items:stretch;height:100%;margin-left:10px}
.tn-item{height:100%;padding:0 14px;display:flex;align-items:center;font-size:13.5px;font-weight:500;color:var(--txm);cursor:pointer;border:none;background:none;font-family:var(--font);border-bottom:2px solid transparent;transition:color var(--t),border-color var(--t);letter-spacing:-.1px;white-space:nowrap}
.tn-item:hover{color:var(--tx2)}
.tn-item.active{color:var(--tx);font-weight:650;border-bottom-color:var(--accent)}
/* ── Right Controls ── */
.tb-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.ibtn{width:30px;height:30px;border:1px solid var(--border);background:none;border-radius:var(--r-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all var(--t);font-size:14px;line-height:1}
.ibtn:hover{border-color:var(--border-med);color:var(--tx);background:var(--bg-hover)}
/* ── Search strip ── */
.search-strip{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg-panel);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;transition:background var(--t),border-color var(--t)}
.search-strip-ttl{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px;white-space:nowrap}
.search-strip .srch{flex:0 0 auto;width:240px}
/* ── Sidebar sub-tabs (指标/维度) ── */
.sb-subtabs{display:flex;gap:3px;padding:3px;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);margin-bottom:10px}
.sb-stab{flex:1;padding:5px 0;border:none;background:none;font-size:12px;font-weight:500;color:var(--txm);cursor:pointer;border-radius:3px;font-family:var(--font);transition:all var(--t)}
.sb-stab.active{background:var(--bg-card);color:var(--tx);box-shadow:var(--sh-xs)}
.sb-stab:hover:not(.active){color:var(--tx2)}
.tb-count{font-size:11.5px;color:var(--txm);white-space:nowrap;padding-right:2px}

/* ── Layout ── */
.layout{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:172px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:12px 8px;background:var(--bg-panel);transition:background var(--t),border-color var(--t)}
.sb-label{font-size:10px;font-weight:600;color:var(--txm);letter-spacing:.7px;text-transform:uppercase;padding:2px 8px 7px;display:block}
.nav-item{display:flex;align-items:center;width:100%;padding:7px 8px;border-radius:var(--r-xs);border:none;background:none;cursor:pointer;text-align:left;font-family:var(--font);gap:8px;transition:background var(--t);position:relative}
.nav-item:hover{background:var(--bg-hover)}
.nav-item.active{background:var(--bg-hover)}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;border-radius:2px;background:var(--accent)}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nav-name{font-size:12.5px;font-weight:500;color:var(--tx2);flex:1;line-height:1.3;transition:color var(--t)}
.nav-item:hover .nav-name{color:var(--tx)}
.nav-item.active .nav-name{color:var(--tx);font-weight:600}
.nav-cnt{font-size:10px;font-family:var(--mono);color:var(--txm);background:var(--bg-card);border:1px solid var(--border);padding:1px 5px;border-radius:3px;transition:background var(--t),border-color var(--t),color var(--t)}
.nav-item.active .nav-cnt{color:var(--tx2);border-color:var(--border-med)}
.nav-divider{height:1px;background:var(--border);margin:6px 0}

/* ── Main ── */
.main{flex:1;overflow-y:auto;background:var(--bg);transition:background var(--t)}

/* ── Metric List ── */
.mlist-hdr{display:grid;grid-template-columns:188px 1fr 244px;padding:6px 16px;border-bottom:1px solid var(--border);background:var(--bg-hdr);position:sticky;top:0;z-index:5;transition:background var(--t),border-color var(--t)}
.mlist-hdr-cell{font-size:10px;font-weight:600;color:var(--txm);letter-spacing:.5px;text-transform:uppercase}

.mrow{display:grid;grid-template-columns:188px 1fr 244px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:16px;transition:background var(--t)}
.mrow:hover{background:var(--bg-hover)}
.mrow.active{background:var(--bg-hover);box-shadow:inset 2px 0 0 var(--accent)}

/* Left meta column */
.mr-meta{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.mr-cat{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--tx2)}
.mr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mr-dir{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;width:fit-content}
.mr-dir.up{background:rgba(5,150,105,.08);color:#059669}
.mr-dir.down{background:rgba(124,58,237,.08);color:#7c3aed}
[data-theme="dark"] .mr-dir.up{background:rgba(0,192,135,.1);color:#00c087}
[data-theme="dark"] .mr-dir.down{background:rgba(167,139,250,.1);color:#a78bfa}

/* Center info column */
.mr-info{min-width:0}
.mr-name{font-size:13.5px;font-weight:650;color:var(--tx);letter-spacing:-.2px;margin-bottom:2px;line-height:1.3;transition:color var(--t)}
.mr-id{font-size:10.5px;font-family:var(--mono);color:var(--txd);margin-bottom:5px;letter-spacing:-.1px}
.mr-desc{font-size:12px;color:var(--tx2);line-height:1.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Right chips column */
.mr-chips{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.mr-chips-row{display:flex;align-items:center;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.mr-owners{display:flex;flex-direction:column;gap:2px;align-items:flex-end}
.mr-owner-item{font-size:10.5px;color:var(--txm);white-space:nowrap}
.mr-owner-item strong{color:var(--tx2);font-weight:500}
.chip{font-size:10.5px;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:2px 8px;border-radius:3px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;transition:background var(--t),border-color var(--t)}
.chip-unit{color:var(--tx2);border-color:var(--border-med)}

/* ── Dimension Grid ── */
.dim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px;padding:16px}
.dim-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh-xs);transition:background var(--t),border-color var(--t)}
.dim-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.dim-name{font-size:13.5px;font-weight:650;color:var(--tx);letter-spacing:-.2px}
.dim-type{font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:1px 6px;border-radius:3px}
.dim-id{font-size:10.5px;font-family:var(--mono);color:var(--txd);margin-bottom:7px;letter-spacing:-.1px}
.dim-desc{font-size:12px;color:var(--tx2);line-height:1.65;margin-bottom:9px}
.dim-meta{display:flex;gap:14px;margin-bottom:8px}
.dim-kv{font-size:11px;color:var(--txm)}
.dim-kv strong{color:var(--tx2);font-weight:600}
.dim-vals{display:flex;gap:4px;flex-wrap:wrap}
.dim-val{font-size:10.5px;font-family:var(--mono);background:var(--bg-hover);border:1px solid var(--border);padding:2px 7px;border-radius:3px;color:var(--txm)}

/* ── Detail Panel ── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.22);opacity:0;pointer-events:none;transition:opacity var(--t);z-index:40}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-panel{position:fixed;top:0;right:0;bottom:0;width:472px;background:var(--bg-panel);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(100%);transition:transform .24s var(--ease),background var(--t),border-color var(--t);z-index:41;display:flex;flex-direction:column}
.detail-panel.open{transform:translateX(0)}

/* Detail Header */
.dp-hdr{padding:16px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;gap:10px}
.dp-hdr-info{flex:1;min-width:0}
.dp-top-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.dp-cat{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--txm)}
.dp-dir-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600}
.dp-dir-badge.up{background:rgba(5,150,105,.09);color:#059669}
.dp-dir-badge.down{background:rgba(124,58,237,.09);color:#7c3aed}
[data-theme="dark"] .dp-dir-badge.up{background:rgba(0,192,135,.1);color:#00c087}
[data-theme="dark"] .dp-dir-badge.down{background:rgba(167,139,250,.1);color:#a78bfa}
.dp-name{font-size:16px;font-weight:700;color:var(--tx);letter-spacing:-.3px;line-height:1.3;margin-bottom:3px}
.dp-id{font-size:11px;font-family:var(--mono);color:var(--txd);letter-spacing:-.1px}
.dp-close{width:28px;height:28px;border:1px solid var(--border);background:var(--bg-hover);border-radius:var(--r-xs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txm);font-size:14px;line-height:1;transition:all var(--t);flex-shrink:0}
.dp-close:hover{border-color:var(--border-med);color:var(--tx)}

/* Detail Body */
.dp-body{padding:16px 18px;flex:1}
.dp-section{margin-bottom:20px}
.dp-section-title{font-size:10px;font-weight:700;color:var(--txm);letter-spacing:.7px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.dp-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* Stats */
.dp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.dp-stat{background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:8px 8px;text-align:center}
.dp-stat-label{font-size:9.5px;font-weight:500;color:var(--txm);margin-bottom:3px;letter-spacing:.1px}
.dp-stat-value{font-size:13px;font-weight:700;font-family:var(--mono);color:var(--tx)}

/* Sparkline */
.dp-sparkline-wrap{overflow:hidden;border-radius:var(--r-xs)}
.dp-chart-xlabels{display:flex;justify-content:space-between;padding:3px 1px 0}
.dp-chart-xlabel{font-size:9.5px;color:var(--txm);font-family:var(--mono)}

/* Formula */
.dp-formula{border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sh-xs)}
.dp-formula-hdr{padding:6px 12px;background:var(--bg-hdr);border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--txm);font-family:var(--mono);letter-spacing:.2px}
.dp-formula-body{padding:10px 13px;font-family:var(--mono);font-size:12px;color:var(--tx);line-height:1.7;word-break:break-all;white-space:pre-wrap;background:var(--bg-card)}

/* Description */
.dp-desc-text{font-size:12.5px;color:var(--tx2);line-height:1.75}

/* Meta grid */
.dp-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dp-meta-item{background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:8px 11px}
.dp-meta-lbl{font-size:10px;font-weight:600;color:var(--txm);letter-spacing:.2px;margin-bottom:3px}
.dp-meta-val{font-size:12.5px;color:var(--tx);font-weight:500}
.dp-meta-val.mono{font-family:var(--mono);font-size:11.5px}

/* Source table */
.dp-table-chip{display:inline-flex;align-items:center;gap:7px;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:7px 13px;font-family:var(--mono);font-size:12px;color:var(--tx2)}
.dp-table-ico{width:18px;height:18px;background:var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--txm);font-family:var(--mono);flex-shrink:0}

/* Chips */
.chips-row{display:flex;gap:5px;flex-wrap:wrap}
.tag-chip{font-size:11px;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:3px 8px;border-radius:3px;font-weight:500;transition:background var(--t)}
.dim-chip{font-size:11px;color:var(--tx2);background:var(--bg-hover);border:1px solid var(--border-med);padding:3px 8px;border-radius:3px;font-family:var(--mono);font-weight:500}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:260px;color:var(--txm);font-size:13px}
.empty-icon{font-size:26px;color:var(--txd);margin-bottom:12px}

/* ── Req Edit Page (full page, not panel) ── */
.req-edit-page{display:flex;flex-direction:column;height:100%;overflow:hidden;background:var(--bg);transition:background var(--t)}
.rep-hdr{display:flex;align-items:center;gap:10px;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--bg-panel);flex-shrink:0;transition:background var(--t),border-color var(--t)}
.rep-back{display:flex;align-items:center;gap:4px;height:30px;padding:0 10px;border:1px solid var(--border);background:none;border-radius:var(--r-xs);font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:var(--font);transition:all var(--t);flex-shrink:0}
.rep-back:hover{border-color:var(--border-med);color:var(--tx);background:var(--bg-hover)}
.rep-hdr-title{flex:1;min-width:0;font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rep-scroll{flex:1;overflow-y:auto}
.rep-inner{max-width:1200px;margin:0 auto;padding:24px 32px 8px}
.rep-step{margin-bottom:20px}
.rep-footer{padding:11px 24px;border-top:1px solid var(--border);background:var(--bg-panel);display:flex;align-items:center;gap:8px;flex-shrink:0;transition:background var(--t),border-color var(--t)}
/* ── Requirements View ── */
.req-view{height:100%;overflow-y:auto;padding:20px;background:var(--bg);transition:background var(--t)}
.req-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.req-ttl{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px}
.btn-new{height:30px;padding:0 14px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-xs);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity var(--t)}
.btn-new:hover{opacity:.8}
.req-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;color:var(--txm);font-size:13px}
.req-empty-icon{font-size:28px;color:var(--txd);margin-bottom:12px}
.req-list{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-xs)}
.req-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;transition:background var(--t);background:var(--bg-card);position:relative}
.req-row:last-child{border-bottom:none}
.req-row:hover{background:var(--bg-hover)}
.req-row-del{display:none;align-items:center;justify-content:center;width:26px;height:26px;border-radius:var(--r-xs);border:none;background:none;cursor:pointer;color:var(--txd);transition:background var(--t),color var(--t);flex-shrink:0;padding:0}
.req-row-del:hover{background:rgba(220,38,38,.1);color:#dc2626}
.req-row:hover .req-row-del{display:flex}
.req-row-info{flex:1;min-width:0}
.req-row-title{font-size:13px;font-weight:650;color:var(--tx);letter-spacing:-.2px;margin-bottom:3px}
.req-row-meta{font-size:11px;color:var(--txm);display:flex;gap:12px}
.req-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10.5px;font-weight:600;white-space:nowrap;flex-shrink:0}
.req-badge.draft{background:rgba(107,114,128,.1);color:#6b7280}
.req-badge.reviewing{background:rgba(245,158,11,.1);color:#d97706}
.req-badge.testing{background:rgba(124,58,237,.1);color:#7c3aed}
.req-badge.in_dev{background:rgba(37,99,235,.1);color:#2563eb}
.req-badge.published{background:rgba(5,150,105,.1);color:#059669}
/* ── Req Panel ── */
.req-panel{position:fixed;top:0;right:0;bottom:0;width:590px;background:var(--bg-panel);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .24s var(--ease),background var(--t),border-color var(--t);z-index:41;display:flex;flex-direction:column;overflow:hidden}
.req-panel.open{transform:translateX(0)}
.rp-hdr{padding:15px 18px 13px;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.rp-hdr-title{font-size:15px;font-weight:700;color:var(--tx);letter-spacing:-.3px}
.step-bar{display:flex;align-items:center}
.step-item{display:flex;align-items:center;gap:7px}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;line-height:1}
.step-num.active{background:var(--accent);color:var(--bg)}
.step-num.done{background:#059669;color:#fff}
.step-num.inactive{background:var(--bg-hover);color:var(--txm);border:1.5px solid var(--border)}
.step-lbl{font-size:12px;font-weight:500;color:var(--txm)}
.step-lbl.active{color:var(--tx);font-weight:600}
.step-lbl.done{color:#059669}
.step-conn{flex:1;height:1px;background:var(--border);margin:0 10px;min-width:28px}
.step-conn.done{background:#059669}
/* form */
.rp-scroll{flex:1;overflow-y:auto}
.rp-body{padding:14px 18px}
.rp-sec{font-size:10px;font-weight:700;color:var(--txm);letter-spacing:.7px;text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
.rp-sec:first-child{margin-top:0}
.rp-sec::after{content:'';flex:1;height:1px;background:var(--border)}
.fg{margin-bottom:11px}
.rep-form{max-width:680px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.flbl{display:block;font-size:10.5px;font-weight:600;color:var(--txm);letter-spacing:.15px;margin-bottom:4px}
.finp{width:100%;height:32px;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:0 10px;color:var(--tx);font-size:12.5px;font-family:var(--font);outline:none;transition:border-color var(--t),background var(--t)}
.finp:focus{background:var(--bg-card);border-color:var(--border-med)}
.fta{width:100%;height:66px;background:var(--bg-hover);border:1px solid var(--border);border-radius:var(--r-xs);padding:8px 10px;color:var(--tx);font-size:12.5px;font-family:var(--font);outline:none;resize:vertical;line-height:1.55;transition:border-color var(--t),background var(--t)}
.fta:focus{background:var(--bg-card);border-color:var(--border-med)}
/* meta table – Excel style */
.meta-wrap{border:1px solid var(--border);border-radius:var(--r-sm);overflow:auto;margin-bottom:8px;max-height:420px}
.meta-tbl{border-collapse:collapse;font-size:11.5px;min-width:100%}
.meta-tbl th{padding:5px 8px;background:var(--bg-hdr);font-size:10px;font-weight:600;color:var(--txm);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:2;border-right:1px solid var(--border);border-bottom:1px solid var(--border-med);user-select:none}
.meta-tbl td{padding:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:middle;background:var(--bg-card)}
.meta-tbl tbody tr:last-child td{border-bottom:none}
.meta-tbl tbody tr:hover td{background:rgba(37,99,235,.03)}
.meta-tbl td:focus-within{outline:2px solid var(--accent);outline-offset:-2px;position:relative;z-index:3;background:var(--bg-card)!important}
/* tag-select */
.tag-sel{position:relative;display:inline-flex;align-items:center;padding:3px 5px;cursor:pointer;user-select:none;min-width:100%;box-sizing:border-box}
.tag-sel.ro{cursor:default}
.tag-chip{display:inline-flex;align-items:center;gap:2px;border-radius:3px;padding:2px 7px;font-size:11px;font-weight:500;line-height:1.5;white-space:nowrap}
.tag-arr{font-size:8px;opacity:.4;margin-left:2px}
.tc-cat{background:rgba(37,99,235,.1);color:#2563eb}
.tc-num{background:rgba(124,58,237,.1);color:#7c3aed}
.tc-bool{background:rgba(5,150,105,.1);color:#059669}
.tc-up{background:rgba(5,150,105,.1);color:#059669}
.tc-down{background:rgba(220,38,38,.1);color:#dc2626}
.tc-unit{background:var(--bg-hover);color:var(--tx2);border:1px solid var(--border)}
.tc-empty{color:var(--txd)}
.tag-dd{position:absolute;top:calc(100% + 2px);left:0;background:var(--bg-panel);border:1px solid var(--border-med);border-radius:var(--r-xs);box-shadow:var(--sh-md);z-index:300;overflow:hidden;display:none;min-width:max-content}
.tag-dd.open{display:block}
.tag-opt{padding:5px 10px;cursor:pointer;display:flex;align-items:center}
.tag-opt:hover{background:var(--bg-hover)}
.tag-opt.cur .tag-chip{outline:1.5px solid currentColor;outline-offset:1px}
.ti{width:100%;height:28px;background:transparent;border:none;padding:0 6px;color:var(--tx);font-size:11.5px;font-family:var(--font);outline:none;display:block}
.ti::placeholder{color:var(--txd)}
.ts{height:28px;background:transparent;border:none;padding:0 5px;color:var(--tx);font-size:11.5px;font-family:var(--font);outline:none;cursor:pointer;width:100%;display:block}
.tbl-del{width:16px;height:100%;background:none;border:none;cursor:pointer;color:var(--txd);font-size:11px;display:flex;align-items:center;justify-content:center;transition:color var(--t),background var(--t);padding:0}
.tbl-del:hover{color:#dc2626}
.row-del-td{padding:0!important;text-align:center;vertical-align:middle}
.meta-tbl th:last-child,.meta-tbl td:last-child{border-right:none}
.btn-add-row{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;border:1px dashed var(--border);border-radius:var(--r-xs);background:none;color:var(--txm);font-size:11.5px;font-family:var(--font);cursor:pointer;width:100%;transition:all var(--t)}
.btn-add-row:hover{border-color:var(--border-med);color:var(--tx2);background:var(--bg-hover)}
/* ── Autocomplete ── */
.ac-wrap{position:relative}
.ac-dd{position:absolute;top:100%;left:0;min-width:180px;background:var(--bg-panel);border:1px solid var(--border-med);border-radius:var(--r-xs);box-shadow:var(--sh-md);z-index:100;overflow:hidden;margin-top:1px}
.ac-item{padding:6px 9px;cursor:pointer;font-size:12px;color:var(--tx);display:flex;justify-content:space-between;align-items:center;gap:8px}
.ac-item:hover{background:var(--bg-hover)}
/* ── Dim picker ── */
.dimpick-wrap{display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-height:26px}
.dimpick-chip{display:inline-flex;align-items:center;gap:3px;background:var(--bg-hover);border:1px solid var(--border-med);border-radius:3px;padding:2px 6px;font-size:10.5px;color:var(--tx2);cursor:pointer;line-height:1.3}
.dimpick-chip:hover{border-color:#dc2626;color:#dc2626}
.dimpick-btn{height:20px;padding:0 6px;background:none;border:1px dashed var(--border);border-radius:3px;font-size:11px;color:var(--txm);cursor:pointer;font-family:var(--font);transition:all var(--t);white-space:nowrap}
.dimpick-btn:hover{border-color:var(--border-med);color:var(--tx2)}
.dimpick-dd{position:absolute;top:100%;left:0;min-width:150px;background:var(--bg-panel);border:1px solid var(--border-med);border-radius:var(--r-xs);box-shadow:var(--sh-md);z-index:100;overflow:hidden;margin-top:2px;max-height:160px;overflow-y:auto}
.dimpick-opt{padding:5px 9px;cursor:pointer;font-size:12px;color:var(--tx);display:flex;align-items:center;gap:4px}
.dimpick-opt:hover{background:var(--bg-hover)}
.dimpick-opt.selected{color:var(--accent);font-weight:600}
/* AI box */
.ai-box{border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 13px;margin-top:12px}
.ai-box.checking{border-color:#f59e0b;background:rgba(245,158,11,.04)}
.ai-box.pass{border-color:rgba(5,150,105,.4);background:rgba(5,150,105,.04)}
.ai-box.fail{border-color:rgba(220,38,38,.35);background:rgba(220,38,38,.04)}
.ai-box-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:12px;font-weight:600;color:var(--tx)}
.ai-box-msg{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:4px}
.ai-item{font-size:11.5px;color:var(--tx2);display:flex;align-items:flex-start;gap:5px;line-height:1.5}
.ai-item+.ai-item{margin-top:2px}
.ai-item.ok::before{content:'✓';color:#059669;flex-shrink:0;font-size:11px}
.ai-item.err::before{content:'✗';color:#dc2626;flex-shrink:0;font-size:11px}
/* footer */
.rp-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--bg-panel);transition:background var(--t),border-color var(--t)}
.ml-auto{margin-left:auto}
.btn-ai{height:30px;padding:0 12px;background:none;border:1px solid var(--border);border-radius:var(--r-xs);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);color:var(--tx2);display:flex;align-items:center;gap:5px;transition:all var(--t)}
.btn-ai:hover:not(:disabled){border-color:var(--border-med);color:var(--tx)}
.btn-ai:disabled{opacity:.45;cursor:not-allowed}
.btn-pri{height:30px;padding:0 14px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-xs);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity var(--t)}
.btn-pri:hover:not(:disabled){opacity:.85}
.btn-pri:disabled{opacity:.35;cursor:not-allowed}
.btn-sec{height:30px;padding:0 12px;background:none;border:1px solid var(--border);border-radius:var(--r-xs);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);color:var(--tx2);transition:all var(--t)}
.btn-sec:hover{border-color:var(--border-med);color:var(--tx)}

/* ── Spreadsheet: fixed-layout + frozen first column ── */
.meta-tbl{table-layout:fixed}
.meta-tbl th:first-child{position:sticky;left:0;z-index:4;background:var(--bg-hdr);border-right:2px solid var(--border-med)!important}
.meta-tbl td:first-child{position:sticky;left:0;z-index:1;background:var(--bg-card);border-right:2px solid var(--border)!important}
.meta-tbl tbody tr:hover td:first-child{background:rgba(37,99,235,.03)}
.meta-tbl td:first-child:focus-within{background:var(--bg-card)!important}
.col-rz{position:absolute;right:0;top:0;bottom:0;width:6px;cursor:col-resize;z-index:3;background:transparent;transition:background var(--t)}
.col-rz::after{content:'';position:absolute;right:1px;top:20%;bottom:20%;width:2px;border-radius:1px;background:var(--border);opacity:0;transition:opacity var(--t)}
.meta-tbl th:hover .col-rz::after{opacity:1}
.col-rz:hover::after,.col-rz.rz-on::after{background:var(--accent);opacity:1!important}
/* ── Contenteditable cells ── */
.tc{display:block;min-height:28px;padding:3px 6px;outline:none;border:none;color:var(--tx);font-size:11.5px;font-family:var(--font);word-break:break-word;white-space:pre-wrap;cursor:text;line-height:1.5;overflow-wrap:anywhere}
.tc:empty::before{content:attr(data-ph);color:var(--txd);pointer-events:none;font-weight:400}
.tc a{color:#2563eb;text-decoration:underline;word-break:break-all}
[data-theme="dark"] .tc a{color:#60a5fa}
/* ── Format toolbar ── */
#fmt-toolbar{position:fixed;background:var(--bg-panel);border:1px solid var(--border-med);border-radius:var(--r-xs);box-shadow:var(--sh-md);display:none;align-items:center;gap:1px;padding:3px;z-index:400}
#fmt-toolbar.show{display:flex}
.fmt-btn{min-width:26px;height:24px;border:none;background:none;border-radius:3px;cursor:pointer;font-size:12px;font-weight:700;color:var(--tx2);font-family:var(--font);display:flex;align-items:center;justify-content:center;padding:0 5px;transition:all var(--t);white-space:nowrap;line-height:1}
.fmt-btn:hover{background:var(--bg-hover);color:var(--tx)}
.fmt-btn.on{background:var(--bg-hover);color:var(--accent)}
.fmt-sep{width:1px;height:16px;background:var(--border);margin:0 2px;flex-shrink:0}

/* ── Assets view ── */
.assets-view{height:100%;overflow-y:auto;background:var(--bg);transition:background var(--t);position:relative}
.assets-toolbar{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:12px}
.assets-ttl{font-size:14px;font-weight:700;color:var(--tx);letter-spacing:-.2px;white-space:nowrap}
.assets-search{flex:1;max-width:280px;height:28px;border:1px solid var(--border);border-radius:6px;background:var(--bg-hover);color:var(--tx);font-size:12px;padding:0 10px;outline:none;transition:border-color var(--t)}
.assets-search:focus{border-color:var(--accent)}
.assets-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;padding:12px 16px 20px}
.asset-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px;box-shadow:var(--sh-xs);transition:background var(--t),border-color var(--t),box-shadow var(--t);cursor:pointer}
.asset-card:hover{box-shadow:var(--sh-sm);border-color:var(--accent)}
.asset-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.asset-layer{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
.layer-ods{background:rgba(107,114,128,.1);color:#6b7280}
.layer-dwd{background:rgba(37,99,235,.1);color:#2563eb}
.layer-dws{background:rgba(124,58,237,.1);color:#7c3aed}
.layer-ads{background:rgba(5,150,105,.1);color:#059669}
[data-theme="dark"] .layer-ods{background:rgba(156,163,175,.1);color:#9ca3af}
[data-theme="dark"] .layer-dwd{background:rgba(96,165,250,.1);color:#60a5fa}
[data-theme="dark"] .layer-dws{background:rgba(167,139,250,.1);color:#a78bfa}
[data-theme="dark"] .layer-ads{background:rgba(52,211,153,.1);color:#34d399}
.asset-name{font-size:12.5px;font-weight:700;color:var(--tx);font-family:var(--mono);letter-spacing:-.2px;min-width:0;word-break:break-all}
.asset-stats{display:flex;gap:14px;margin-bottom:9px}
.asset-stat{font-size:11.5px;color:var(--txm)}
.asset-stat strong{color:var(--tx2);font-weight:600}
.asset-linked{display:flex;gap:4px;flex-wrap:wrap}
.asset-linked-chip{font-size:10.5px;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:2px 7px;border-radius:3px;font-family:var(--mono);white-space:nowrap}
/* ── Asset detail ── */
.asset-detail{position:absolute;inset:0;background:var(--bg);overflow-y:auto;z-index:10;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}
.ad-header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.ad-back{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--txm);cursor:pointer;padding:4px 8px;border-radius:5px;border:none;background:none;transition:all var(--t)}
.ad-back:hover{background:var(--bg-hover);color:var(--tx)}
.ad-title{font-size:14px;font-weight:700;color:var(--tx);font-family:var(--mono);letter-spacing:-.2px}
.ad-body{padding:16px}
.ad-section{margin-bottom:20px}
.ad-section-ttl{font-size:11px;font-weight:700;color:var(--txm);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ad-meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.ad-meta-item{background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.ad-meta-label{font-size:10.5px;color:var(--txm);margin-bottom:3px}
.ad-meta-value{font-size:12.5px;font-weight:600;color:var(--tx)}
.ad-metric-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.ad-metric-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ad-metric-name{font-size:13px;font-weight:700;color:var(--tx)}
.ad-metric-unit{font-size:10.5px;color:var(--txm);background:var(--bg-hover);border:1px solid var(--border);padding:1px 6px;border-radius:3px}
.ad-metric-cat{font-size:10.5px;color:var(--accent);font-weight:600}
.ad-metric-desc{font-size:12px;color:var(--tx2);line-height:1.5;margin-bottom:8px}
.ad-metric-formula{font-size:11px;color:var(--txm);font-family:var(--mono);background:var(--bg-hover);padding:6px 8px;border-radius:4px;margin-bottom:8px;word-break:break-all}
.ad-dims{display:flex;gap:4px;flex-wrap:wrap}
.ad-dim-chip{font-size:10.5px;color:var(--tx2);background:var(--bg-hover);border:1px solid var(--border);padding:2px 8px;border-radius:3px}

/* ── Login overlay ── */
#login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .2s}
#login-overlay.hidden{opacity:0;pointer-events:none}
.login-card{width:340px;padding:40px 36px 36px;background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-md);display:flex;flex-direction:column;gap:20px}
.login-logo{display:flex;align-items:center;gap:10px}
.login-logo .brand-mark{width:34px;height:34px;font-size:12px}
.login-logo .brand-name{font-size:16px;font-weight:700;letter-spacing:-.4px}
.login-title{font-size:13px;color:var(--tx2);margin-top:-10px}
.login-field{display:flex;flex-direction:column;gap:6px}
.login-field label{font-size:12px;font-weight:600;color:var(--tx2)}
.login-field input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--bg);color:var(--tx);font-size:13.5px;font-family:var(--font);outline:none;transition:border-color .15s}
.login-field input:focus{border-color:var(--accent)}
.login-err{font-size:12px;color:#e74c3c;min-height:16px}
.login-btn{width:100%;padding:10px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── User badge in toolbar ── */
.user-badge{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--tx2);cursor:default}
.user-badge .avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.logout-btn{font-size:11.5px;color:var(--txm);background:none;border:1px solid var(--border);border-radius:var(--r-xs);padding:3px 8px;cursor:pointer;font-family:var(--font);transition:color .15s,border-color .15s}
.logout-btn:hover{color:var(--tx);border-color:var(--border-med)}
</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand-mark">AL</div>
      <span class="brand-name">资产库</span>
    </div>
    <div class="login-title">请登录以继续</div>
    <div class="login-field">
      <label>用户名</label>
      <input id="login-username" type="text" placeholder="admin" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>密码</label>
      <input id="login-password" type="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">登录</button>
  </div>
</div>

<div class="toolbar">
  <a class="brand" href="#">
    <div class="brand-mark">AL</div>
    <span class="brand-name">资产库</span>
  </a>
  <div class="brand-sep"></div>
  <nav class="top-nav" id="top-nav">
    <button class="tn-item active" onclick="switchTab('search')">指标管理</button>
    <button class="tn-item" onclick="switchTab('assets')">数据管理</button>
    <button class="tn-item" onclick="switchTab('request')">需求管理</button>
  </nav>
  <div class="tb-right" style="display:flex;align-items:center;gap:10px">
    <div class="user-badge" id="user-badge" style="display:none">
      <div class="avatar" id="user-avatar"></div>
      <span id="user-name"></span>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
    <button class="ibtn" id="theme-btn" title="切换主题">◑</button>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div class="search-strip" id="search-strip">
      <span class="search-strip-ttl">指标字典<span class="tb-count" id="count-label" style="font-size:11px;font-weight:400;margin-left:6px"></span></span>
      <div class="srch">
        <span class="srch-ico">⌕</span>
        <input type="text" id="search-input" placeholder="搜索指标名称、取数表、标签…" autocomplete="off">
      </div>

<script>
/* ── Auth ── */
const AUTH_URL = 'http://127.0.0.1:3470';
let _token = localStorage.getItem('dc_token') || null;

function authHeaders() {
  return _token ? { 'Authorization': `Bearer ${_token}`, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

function setUser(username) {
  const badge = document.getElementById('user-badge');
  const avatar = document.getElementById('user-avatar');
  const nameEl = document.getElementById('user-name');
  if (username) {
    avatar.textContent = username[0].toUpperCase();
    nameEl.textContent = username;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function showLogin(errMsg) {
  const overlay = document.getElementById('login-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('login-err').textContent = errMsg || '';
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  setTimeout(() => document.getElementById('login-username').focus(), 50);
}

function hideLogin() {
  document.getElementById('login-overlay').classList.add('hidden');
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { document.getElementById('login-err').textContent = '请输入用户名和密码'; return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = '登录中…';
  try {
    const res = await fetch(`${AUTH_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) { document.getElementById('login-err').textContent = data.error || '登录失败'; return; }
    _token = data.token;
    localStorage.setItem('dc_token', _token);
    setUser(data.username);
    hideLogin();
    syncMcpRequests();
  } catch {
    document.getElementById('login-err').textContent = '无法连接服务器';
  } finally {
    btn.disabled = false;
    btn.textContent = '登录';
  }
}

async function doLogout() {
  await fetch(`${AUTH_URL}/api/auth/logout`, { method: 'POST', headers: authHeaders() }).catch(() => {});
  _token = null;
  localStorage.removeItem('dc_token');
  setUser(null);
  showLogin();
}

async function checkAuth() {
  if (!_token) { showLogin(); return false; }
  try {
    const res = await fetch(`${AUTH_URL}/api/auth/me`, { headers: authHeaders() });
    if (!res.ok) { _token = null; localStorage.removeItem('dc_token'); showLogin(); return false; }
    const data = await res.json();
    setUser(data.username);
    hideLogin();
    return true;
  } catch {
    // server not running — hide login to allow offline browsing
    hideLogin();
    return false;
  }
}

/* ── Deterministic sim ── */
function hashKey(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = Math.imul((h << 5) + h, 1) ^ s.charCodeAt(i);
  return h >>> 0;
}
function simValue(metric, dateStr) {
  const h = hashKey(metric.id + '|' + dateStr);
  const rand = (h % 100000) / 100000;
  const daysFrom = (new Date(dateStr) - new Date('2024-01-01')) / 86400000;
  return metric.sim.base * (1 + metric.sim.trend * daysFrom / 365) * (1 + (rand - 0.5) * metric.sim.variance);
}
function genSeries(metric, days = 30) {
  const end = new Date('2024-12-30');
  const vals = [], labels = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(end); d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    vals.push(Math.round(simValue(metric, ds) * 100) / 100);
    labels.push(ds.slice(5));
  }
  return { vals, labels };
}

/* ── Sparkline ── */
function renderSparkline(vals, W = 420, H = 68) {
  if (!vals || vals.length < 2) return '';
  const PAD = {t:10,b:6,l:4,r:44};
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const gW = W - PAD.l - PAD.r, gH = H - PAD.t - PAD.b;
  const x = i => PAD.l + (i / (vals.length - 1)) * gW;
  const y = v => PAD.t + (1 - (v - min) / range) * gH;
  const isUp = vals[vals.length - 1] >= vals[0];
  const color = isUp ? '#00c087' : '#818cf8';
  const pts = vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const area = `M${x(0).toFixed(1)},${(PAD.t + gH).toFixed(1)} ` +
    vals.map((v, i) => `L${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ') +
    ` L${x(vals.length - 1).toFixed(1)},${(PAD.t + gH).toFixed(1)} Z`;
  const gId = 'sg' + Math.random().toString(36).slice(2, 7);
  const fmtY = v => v >= 10000 ? (v/10000).toFixed(1)+'w' : v >= 1000 ? (v/1000).toFixed(1)+'k' : v.toFixed(v < 10 ? 1 : 0);
  const yLabels = [max, min + range/2, min].map(v =>
    `<text x="${W-PAD.r+6}" y="${(y(v)+3.5).toFixed(1)}" style="fill:var(--txm)" font-size="9" font-family="monospace">${fmtY(v)}</text>`
  ).join('');
  const gridLines = [0, 0.5, 1].map(f => {
    const yy = (PAD.t + f * gH).toFixed(1);
    return `<line x1="${PAD.l}" y1="${yy}" x2="${W-PAD.r}" y2="${yy}" style="stroke:var(--border)" stroke-width="1"/>`;
  }).join('');
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;width:100%;overflow:visible">
    <defs><linearGradient id="${gId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".14"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${gridLines}
    <path d="${area}" fill="url(#${gId})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    ${yLabels}
  </svg>`;
}

/* ── Column resize state ── */
let dimColWidths = [];
let metricColWidths = [];
let _rzState = null; // { tableId, colIdx, startX, startW }

function _defaultDimW(showSrc) {
  return showSrc ? [60,70,158,108,16] : [60,70,200,16];
}
function _defaultMetW(showSrc) {
  return showSrc ? [60,52,70,158,132,108,16] : [60,52,70,188,132,16];
}
function _applyColWidths(tableId, widths) {
  const tbl = document.getElementById(tableId);
  if (!tbl) return;
  tbl.querySelectorAll('col').forEach((c, i) => { if (widths[i]) c.style.width = widths[i] + 'px'; });
}
function startColResize(e, tableId, colIdx) {
  e.preventDefault(); e.stopPropagation();
  const th = e.currentTarget.parentElement;
  e.currentTarget.classList.add('rz-on');
  _rzState = { tableId, colIdx, startX: e.clientX, startW: th.offsetWidth };
  document.addEventListener('mousemove', _onRzMove);
  document.addEventListener('mouseup', _onRzEnd);
}
function _onRzMove(e) {
  if (!_rzState) return;
  const w = Math.max(36, _rzState.startW + e.clientX - _rzState.startX);
  const arr = _rzState.tableId === 'dim-sp-tbl' ? dimColWidths : metricColWidths;
  arr[_rzState.colIdx] = w;
  const tbl = document.getElementById(_rzState.tableId);
  if (tbl) { const cols = tbl.querySelectorAll('col'); if (cols[_rzState.colIdx]) cols[_rzState.colIdx].style.width = w + 'px'; }
}
function _onRzEnd() {
  document.querySelectorAll('.col-rz.rz-on').forEach(h => h.classList.remove('rz-on'));
  _rzState = null;
  document.removeEventListener('mousemove', _onRzMove);
  document.removeEventListener('mouseup', _onRzEnd);
}

/* ── Format toolbar ── */
let _fmtEl = null;
function showFmtToolbar(el) {
  _fmtEl = el;
  const tb = document.getElementById('fmt-toolbar');
  if (!tb) return;
  const r = el.getBoundingClientRect();
  const top = r.top - 36;
  tb.style.left = Math.max(4, r.left) + 'px';
  tb.style.top = (top < 4 ? r.bottom + 4 : top) + 'px';
  tb.classList.add('show');
  _updateFmtState();
}
function hideFmtToolbar(rel) {
  const tb = document.getElementById('fmt-toolbar');
  if (!tb) return;
  if (rel && tb.contains(rel)) return;
  tb.classList.remove('show');
  _fmtEl = null;
}
function _updateFmtState() {
  const b = document.getElementById('fmt-b');
  const i = document.getElementById('fmt-i');
  if (b) b.classList.toggle('on', document.queryCommandState('bold'));
  if (i) i.classList.toggle('on', document.queryCommandState('italic'));
}
function fmtBold() {
  if (_fmtEl) { _fmtEl.focus(); document.execCommand('bold'); _syncTc(_fmtEl); _updateFmtState(); }
}
function fmtItalic() {
  if (_fmtEl) { _fmtEl.focus(); document.execCommand('italic'); _syncTc(_fmtEl); _updateFmtState(); }
}
function fmtLink() {
  if (!_fmtEl) return;
  _fmtEl.focus();
  const sel = window.getSelection();
  const range = sel && sel.rangeCount > 0 ? sel.getRangeAt(0).cloneRange() : null;
  const url = prompt('输入链接 URL：', 'https://');
  if (!url || url === 'https://') return;
  _fmtEl.focus();
  if (range) { sel.removeAllRanges(); sel.addRange(range); }
  if (sel && sel.toString().trim()) {
    document.execCommand('createLink', false, url);
    // Force target=_blank on new link
    const a = _fmtEl.querySelector('a[href="' + url + '"]');
    if (a) a.target = '_blank';
  } else {
    document.execCommand('insertHTML', false, `<a href="${esc(url)}" target="_blank">${esc(url)}</a>`);
  }
  _syncTc(_fmtEl);
}
function fmtUnlink() {
  if (_fmtEl) { _fmtEl.focus(); document.execCommand('unlink'); _syncTc(_fmtEl); }
}
function fmtClear() {
  if (_fmtEl) { _fmtEl.focus(); document.execCommand('removeFormat'); document.execCommand('unlink'); _syncTc(_fmtEl); _updateFmtState(); }
}
// Sync contenteditable HTML back to reqDraft after toolbar action
function _syncTc(el) {
  const idx = parseInt(el.dataset.dim ?? el.dataset.metric ?? el.dataset.dimDesc ?? el.dataset.metDesc ?? '-1');
  if (idx < 0) return;
  const field = el.dataset.field;
  const table = el.dataset.tbl;
  if (!field || !table || !reqDraft) return;
  if (table === 'dim') updateDimRow(idx, field, el.innerHTML);
  else updateMetricRow(idx, field, el.innerHTML);
}

/* ── Filter ── */
function filterMetrics() {
  const q = searchQuery.toLowerCase();
  return METRICS.filter(m => {
    const catOk = currentCat === 'all' || m.category === currentCat;
    if (!q) return catOk;
    return catOk && (
      m.display_name.toLowerCase().includes(q) ||
      m.name.toLowerCase().includes(q) ||
      m.description.toLowerCase().includes(q) ||
      m.tags.some(t => t.toLowerCase().includes(q)) ||
      m.source_table.toLowerCase().includes(q) ||
      m.category.toLowerCase().includes(q)
    );
  });
}

/* ── Assets (数据管理 / 资产字典) ── */
let currentLayer = 'all';
let assetSearch = '';

function _getLayer(tableName) {
  const p = (tableName || '').split('_')[0].toLowerCase();
  return { ods:{id:'ods',label:'ODS'}, dwd:{id:'dwd',label:'DWD'},
           dws:{id:'dws',label:'DWS'}, ads:{id:'ads',label:'ADS'} }[p]
    || { id:'ods', label: p.toUpperCase() || 'ODS' };
}

function _buildTableMap() {
  const tableMap = {};
  METRICS.forEach(m => {
    if (!m.source_table) return;
    if (!tableMap[m.source_table]) tableMap[m.source_table] = { name:m.source_table, metrics:[], freqs:new Set() };
    tableMap[m.source_table].metrics.push(m);
    if (m.update_freq) tableMap[m.source_table].freqs.add(m.update_freq);
  });
  return tableMap;
}

function selectLayer(layer) {
  currentLayer = layer;
  renderSidebar();
  renderAssetsView();
}

function _buildAssetsGrid() {
  const tableMap = _buildTableMap();
  let tables = Object.values(tableMap).sort((a,b) => {
    const order = { ods:0, dwd:1, dws:2, ads:3 };
    return (order[_getLayer(a.name).id]||9) - (order[_getLayer(b.name).id]||9) || a.name.localeCompare(b.name);
  });

  if (currentLayer !== 'all') tables = tables.filter(t => _getLayer(t.name).id === currentLayer);
  if (assetSearch.trim()) {
    const kw = assetSearch.trim().toLowerCase();
    tables = tables.filter(t => t.name.toLowerCase().includes(kw) ||
      t.metrics.some(m => m.display_name.toLowerCase().includes(kw) || (m.category||'').toLowerCase().includes(kw)));
  }

  const cards = tables.map(t => {
    const layer = _getLayer(t.name);
    const cats = [...new Set(t.metrics.map(m => m.category))];
    const freqStr = [...t.freqs].join(' / ') || '—';
    const shown = t.metrics.slice(0, 4);
    const more = t.metrics.length - shown.length;
    return `<div class="asset-card" onclick="showAssetDetail('${esc(t.name)}')">
      <div class="asset-top">
        <span class="asset-layer layer-${layer.id}">${layer.label}</span>
        <span class="asset-name">${esc(t.name)}</span>
      </div>
      <div class="asset-stats">
        <span class="asset-stat"><strong>${t.metrics.length}</strong> 个指标</span>
        <span class="asset-stat"><strong>${cats.length}</strong> 个业务域</span>
        <span class="asset-stat">更新频率 <strong>${esc(freqStr)}</strong></span>
      </div>
      <div class="asset-linked">
        ${shown.map(m => `<span class="asset-linked-chip">${esc(m.display_name)}</span>`).join('')}
        ${more > 0 ? `<span class="asset-linked-chip" style="color:var(--txm)">+${more}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  return { cards, count: tables.length };
}

function renderAssetsView() {
  const el = document.getElementById('assets-view');
  if (!el) return;

  const { cards, count } = _buildAssetsGrid();

  // First render: build the full shell including toolbar
  if (!el.querySelector('.assets-toolbar')) {
    el.innerHTML = `
      <div class="assets-toolbar">
        <span class="assets-ttl">资产字典
          <span id="assets-count" style="font-size:11px;font-weight:400;color:var(--txm);margin-left:6px">${count} 张表</span>
        </span>
        <input id="assets-search-input" class="assets-search" type="text" placeholder="搜索表名、指标、业务域…"
          value="${esc(assetSearch)}" autocomplete="off">
      </div>
      <div id="assets-grid" class="assets-grid"></div>`;
    document.getElementById('assets-search-input').addEventListener('input', function() {
      assetSearch = this.value;
      _refreshAssetsGrid();
    });
  }

  _refreshAssetsGrid();
}

function _refreshAssetsGrid() {
  const grid = document.getElementById('assets-grid');
  const countEl = document.getElementById('assets-count');
  if (!grid) return;
  const { cards, count } = _buildAssetsGrid();
  grid.innerHTML = cards || '<div style="padding:20px;color:var(--txm);font-size:13px">暂无匹配数据资产</div>';
  if (countEl) countEl.textContent = count + ' 张表';
}

function showAssetDetail(tableName) {
  const tableMap = _buildTableMap();
  const t = tableMap[tableName];
  if (!t) return;
  const el = document.getElementById('assets-view');
  const layer = _getLayer(t.name);
  const cats = [...new Set(t.metrics.map(m => m.category))];
  const freqStr = [...t.freqs].join(' / ') || '—';
  const owners = [...new Set(t.metrics.map(m => m.owner).filter(Boolean))];

  // Collect all dimension ids used across metrics in this table
  const allDimIds = [...new Set(t.metrics.flatMap(m => m.available_dimensions || []))];
  const dimMap = Object.fromEntries(DIMENSIONS.map(d => [d.id, d]));

  const metricCards = t.metrics.map(m => {
    const dims = (m.available_dimensions || []).map(id => {
      const d = dimMap[id];
      return `<span class="ad-dim-chip">${d ? esc(d.display_name) : esc(id)}</span>`;
    }).join('');
    return `<div class="ad-metric-card">
      <div class="ad-metric-top">
        <span class="ad-metric-name">${esc(m.display_name)}</span>
        ${m.unit ? `<span class="ad-metric-unit">${esc(m.unit)}</span>` : ''}
        <span class="ad-metric-cat">${esc(m.category)}</span>
      </div>
      <div class="ad-metric-desc">${esc(m.description)}</div>
      ${m.formula ? `<div class="ad-metric-formula">${esc(m.formula)}</div>` : ''}
      ${dims ? `<div class="ad-dims">${dims}</div>` : ''}
    </div>`;
  }).join('');

  const dimSection = allDimIds.length ? allDimIds.map(id => {
    const d = dimMap[id];
    if (!d) return '';
    return `<div class="ad-meta-item">
      <div class="ad-meta-label">${esc(d.display_name)}</div>
      <div class="ad-meta-value" style="font-size:11.5px;font-weight:500;color:var(--tx2)">${esc(d.description)}</div>
    </div>`;
  }).join('') : '';

  const detail = document.createElement('div');
  detail.className = 'asset-detail';
  detail.id = 'asset-detail';
  detail.innerHTML = `
    <div class="ad-header">
      <button class="ad-back" onclick="closeAssetDetail()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        返回
      </button>
      <span class="asset-layer layer-${layer.id}">${layer.label}</span>
      <span class="ad-title">${esc(t.name)}</span>
    </div>
    <div class="ad-body">
      <div class="ad-section">
        <div class="ad-section-ttl">元数据</div>
        <div class="ad-meta-grid">
          <div class="ad-meta-item"><div class="ad-meta-label">数据层级</div><div class="ad-meta-value">${layer.label}</div></div>
          <div class="ad-meta-item"><div class="ad-meta-label">更新频率</div><div class="ad-meta-value">${esc(freqStr)}</div></div>
          <div class="ad-meta-item"><div class="ad-meta-label">关联指标数</div><div class="ad-meta-value">${t.metrics.length} 个</div></div>
          <div class="ad-meta-item"><div class="ad-meta-label">业务域</div><div class="ad-meta-value" style="font-size:11.5px">${cats.map(c => esc(c)).join('、') || '—'}</div></div>
          <div class="ad-meta-item"><div class="ad-meta-label">可用维度数</div><div class="ad-meta-value">${allDimIds.length} 个</div></div>
          ${owners.length ? `<div class="ad-meta-item"><div class="ad-meta-label">负责团队</div><div class="ad-meta-value" style="font-size:11.5px">${owners.map(o => esc(o)).join('、')}</div></div>` : ''}
        </div>
      </div>
      ${dimSection ? `<div class="ad-section"><div class="ad-section-ttl">维度说明（${allDimIds.length}）</div><div class="ad-meta-grid">${dimSection}</div></div>` : ''}
      <div class="ad-section">
        <div class="ad-section-ttl">关联指标（${t.metrics.length}）</div>
        ${metricCards}
      </div>
    </div>`;
  el.appendChild(detail);
}

function closeAssetDetail() {
  const d = document.getElementById('asset-detail');
  if (d) d.remove();
}

let currentReqId = null;
let reqDraft = null;
let reqAiState = null; // { step, status:'idle'|'checking'|'pass'|'fail', message, items }

function emptyDimRow() {
  return { display_name:'', type:'categorical', category:'', description:'', source_table:'', update_freq:'天' };
}
function emptyMetricRow() {
  return { display_name:'', category:'', unit:'', direction:'up', description:'', source_table:'', update_freq:'天', available_dims:[] };
}

function genReqId() {
  return 'req_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

function initDraft(task) {
  if (task) {
    reqDraft = JSON.parse(JSON.stringify(task));
    // Migrate old metaRows format
    if (reqDraft.metaRows && !reqDraft.dimRows) {
      reqDraft.dimRows = reqDraft.metaRows.filter(r => r.type === 'dimension').map(r => ({
        display_name:r.display_name, type:'categorical', category:r.category||'',
        description:r.formula||'', source_table:r.source_table||'', update_freq:r.update_freq||'天'
      }));
      reqDraft.metricRows = reqDraft.metaRows.filter(r => r.type !== 'dimension').map(r => ({
        display_name:r.display_name, category:r.category||'', unit:r.unit||'',
        direction:'up', description:r.formula||'', source_table:r.source_table||'',
        update_freq:r.update_freq||'天', available_dims:[]
      }));
      delete reqDraft.metaRows;
    }
    if (!reqDraft.dimRows) reqDraft.dimRows = [emptyDimRow()];
    if (!reqDraft.metricRows) reqDraft.metricRows = [emptyMetricRow()];
    // Remove legacy time-type rows
    reqDraft.dimRows = reqDraft.dimRows.filter(r => r.type !== 'time');
  } else {
    reqDraft = { id:null, title:'', background:'', benefit:'', requester:'', assignee:'',
      status:'draft', createdAt:new Date().toISOString(),
      dimRows:[emptyDimRow()], metricRows:[emptyMetricRow()], step1Review:null, step2Test:null };
  }
  reqAiState = null;
}

function syncMcpRequests(callback) {
  fetch('http://127.0.0.1:3470/api/requests', { headers: authHeaders() })
    .then(r => {
      if (r.status === 401) { showLogin('登录已过期，请重新登录'); throw new Error('401'); }
      return r.json();
    })
    .then(mcpList => {
      mcpList.forEach(r => {
        if (reqTasks.find(t => t.id === r.id)) return; // already exists
        // map MCP schema → reqTask schema
        reqTasks.push({
          id: r.id,
          title: r.title,
          background: r.background || '',
          benefit: r.benefit || '',
          requester: r.owner || '',
          assignee: '',
          priority: r.priority || 'medium',
          due_date: r.due_date || '',
          status: r.status || 'draft',
          createdAt: r.created_at || new Date().toISOString(),
          dimRows: (r.dimensions || []).map(d => ({
            display_name: d.display_name || d.name || '',
            type: d.type || 'categorical',
            category: '',
            description: d.description || '',
            source_table: '',
            update_freq: ''
          })),
          metricRows: (r.metrics || []).map(m => ({
            display_name: m.display_name || m.name || '',
            category: '',
            unit: m.unit || '',
            direction: m.direction || 'up',
            description: m.description || '',
            source_table: '',
            update_freq: '',
            available_dims: []
          })),
          step1Review: null,
          step2Test: null
        });
      });
      if (callback) callback();
    })
    .catch(() => { if (callback) callback(); }); // ignore if MCP not running
}

function renderReqView() {
  const el = document.getElementById('req-view');
  // sync from MCP first, then render
  syncMcpRequests(() => _doRenderReqView(el));
}

function _doRenderReqView(el) {
  if (!el) el = document.getElementById('req-view');
  const sorted = [...reqTasks].sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
  const rows = sorted.map(t => {
    const dimCnt = (t.dimRows||[]).length;
    const metCnt = (t.metricRows||[]).length;
    const cntText = `${dimCnt} 维度 / ${metCnt} 指标`;
    return `
    <div class="req-row" onclick="openReqPanel('${esc(t.id)}')">
      <div class="req-row-info">
        <div class="req-row-title">${esc(t.title||'未命名需求')}</div>
        <div class="req-row-meta">
          <span>业务负责人：${esc(t.requester||'—')}</span>
          <span>技术负责人：${esc(t.assignee||'—')}</span>
          <span>${cntText}</span>
        </div>
      </div>
      <span class="req-badge ${t.status}">${REQ_STATUS_LBL[t.status]||t.status}</span>
      <button class="req-row-del" onclick="deleteReqTask(event,'${esc(t.id)}')" title="删除需求">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="req-toolbar">
      <span class="req-ttl">需求任务
        <span style="font-size:11px;font-weight:400;color:var(--txm);margin-left:5px">${reqTasks.length} 条</span>
      </span>
      <button class="btn-new" onclick="openNewReq()">+ 新建需求</button>
    </div>
    ${rows ? `<div class="req-list">${rows}</div>`
            : '<div class="req-empty"><div class="req-empty-icon">📋</div>暂无需求，点击右上角新建</div>'}`;
}

function deleteReqTask(e, id) {
  e.stopPropagation();
  const task = reqTasks.find(t => t.id === id);
  if (!task) return;
  if (!confirm(`确认删除需求「${task.title || '未命名需求'}」？此操作不可撤销。`)) return;
  reqTasks = reqTasks.filter(t => t.id !== id);
  // if currently editing this task, close the edit view
  if (currentReqId === id) {
    document.getElementById('req-edit-view').style.display = 'none';
    document.getElementById('req-view').style.display = '';
    reqDraft = null;
    currentReqId = null;
  }
  _doRenderReqView(document.getElementById('req-view'));
  // sync deletion to MCP server
  fetch(`http://127.0.0.1:3470/api/requests/${id}`, { method: 'DELETE', headers: authHeaders() }).catch(() => {});
}

function openNewReq() {
  initDraft(null);
  currentReqId = '__new__';
  _openReqPanel();
}

function openReqPanel(id) {
  // Tasks open as full edit page, not panel
  openReqEdit(id);
}

function _openReqPanel() {
  renderReqPanelContent();
  document.getElementById('req-panel').classList.add('open');
  document.getElementById('req-overlay').classList.add('open');
}

function closeReqPanel() {
  document.getElementById('req-panel').classList.remove('open');
  document.getElementById('req-overlay').classList.remove('open');
  currentReqId = null;
  reqDraft = null;
  reqAiState = null;
}

/* ── Full page edit ── */
function openReqEdit(id) {
  const task = reqTasks.find(t => t.id === id);
  if (!task) return;
  initDraft(task);
  currentReqId = id;
  document.getElementById('req-view').style.display = 'none';
  document.getElementById('req-edit-view').style.display = '';
  renderReqEditPage();
}

function backToDraft() {
  if (!reqDraft) return;
  reqDraft.status = 'draft';
  const idx = reqTasks.findIndex(t => t.id === reqDraft.id);
  if (idx >= 0) reqTasks[idx] = JSON.parse(JSON.stringify(reqDraft));
  reqAiState = null;
  renderReqView();
  renderReqEditPage();
}

function submitForReview() {
  if (!reqDraft) return;
  if (!reqDraft.title.trim()) {
    alert('请先填写需求标题');
    return;
  }
  const hasDim = (reqDraft.dimRows||[]).some(r => pt(r.display_name).trim());
  const hasMet = (reqDraft.metricRows||[]).some(r => pt(r.display_name).trim());
  if (!hasDim || !hasMet) {
    alert('请至少录入一条维度和一条指标');
    return;
  }
  reqDraft.status = 'reviewing';
  const idx = reqTasks.findIndex(t => t.id === reqDraft.id);
  if (idx >= 0) reqTasks[idx] = JSON.parse(JSON.stringify(reqDraft));
  reqAiState = null;
  renderReqView();
  renderReqEditPage();
}

function submitForTesting() {
  if (!reqDraft) return;
  const dimFilled = (reqDraft.dimRows||[]).some(r => r.source_table && r.source_table.trim());
  const metFilled = (reqDraft.metricRows||[]).some(r => r.source_table && r.source_table.trim());
  if (!dimFilled || !metFilled) { alert('请先补录来源表信息'); return; }
  reqDraft.status = 'testing';
  const idx = reqTasks.findIndex(t => t.id === reqDraft.id);
  if (idx >= 0) reqTasks[idx] = JSON.parse(JSON.stringify(reqDraft));
  reqAiState = null;
  renderReqView();
  renderReqEditPage();
}

function backToInDev() {
  if (!reqDraft) return;
  reqDraft.status = 'in_dev';
  const idx = reqTasks.findIndex(t => t.id === reqDraft.id);
  if (idx >= 0) reqTasks[idx] = JSON.parse(JSON.stringify(reqDraft));
  reqAiState = null;
  renderReqView();
  renderReqEditPage();
}

function closeReqEdit() {
  // Auto-save if still draft, reviewing, or in_dev
  if (reqDraft && reqDraft.id && ['draft','reviewing','in_dev'].includes(reqDraft.status)) {
    const idx = reqTasks.findIndex(t => t.id === reqDraft.id);
    if (idx >= 0) reqTasks[idx] = JSON.parse(JSON.stringify(reqDraft));
  }
  document.getElementById('req-edit-view').style.display = 'none';
  document.getElementById('req-view').style.display = '';
  currentReqId = null;
  reqDraft = null;
  reqAiState = null;
  renderReqView();
}

function saveReqDraft() {
  if (!reqDraft || !reqDraft.id) return;
  const idx = reqTasks.findIndex(t => t.id === reqDraft.id);
  if (idx >= 0) reqTasks[idx] = JSON.parse(JSON.stringify(reqDraft));
  renderReqView();
  const btn = document.getElementById('btn-save-draft');
  if (btn) { btn.textContent = '已保存 ✓'; btn.disabled = true;
    setTimeout(() => { if (btn) { btn.textContent = '保存'; btn.disabled = false; } }, 1800); }
}

function renderReqPanelContent() {
  if (!reqDraft) return;
  const isNew       = currentReqId === '__new__';
  const isDraft     = reqDraft.status === 'draft';
  const isReviewing = reqDraft.status === 'reviewing';
  const isInDev     = ['in_dev','testing'].includes(reqDraft.status);
  const isTesting   = reqDraft.status === 'testing';
  const isPublished = reqDraft.status === 'published';

  let stepBar = '';
  if (!isNew) {
    const s1done = !isDraft;
    const s2done = isInDev || isTesting || isPublished;
    const s3done = isTesting || isPublished;
    const s4done = isPublished;
    stepBar = `<div class="step-bar" style="margin-top:10px">
      <div class="step-item">
        <div class="step-num ${s1done?'done':'active'}">${s1done?'✓':'1'}</div>
        <span class="step-lbl ${s1done?'done':'active'}">需求录入</span>
      </div>
      <div class="step-conn ${s1done?'done':''}"></div>
      <div class="step-item">
        <div class="step-num ${s2done?'done':isReviewing?'active':'inactive'}">${s2done?'✓':'2'}</div>
        <span class="step-lbl ${s2done?'done':isReviewing?'active':''}">AI需求审核</span>
      </div>
      <div class="step-conn ${s2done?'done':''}"></div>
      <div class="step-item">
        <div class="step-num ${s3done?'done':isInDev?'active':'inactive'}">${s3done?'✓':'3'}</div>
        <span class="step-lbl ${s3done?'done':isInDev?'active':''}">开发注册</span>
      </div>
      <div class="step-conn ${s3done?'done':''}"></div>
      <div class="step-item">
        <div class="step-num ${s4done?'done':isTesting?'active':'inactive'}">${s4done?'✓':'4'}</div>
        <span class="step-lbl ${s4done?'done':isTesting?'active':''}">AI数据测试</span>
      </div>
    </div>`;
  }

  const titleText = isNew ? '新建需求' : (reqDraft.title ? esc(reqDraft.title) : '需求详情');
  let body, footer;
  if (isNew)            { body = renderCreateBody();    footer = renderCreateFooter(); }
  else if (isDraft)     { body = renderDraftBody();     footer = renderDraftFooter(); }
  else if (isReviewing) { body = renderReviewingBody(); footer = renderReviewingFooter(); }
  else if (isInDev)     { body = renderS2Body();        footer = renderS2Footer(); }
  else if (isTesting)   { body = renderTestingBody();   footer = renderTestingFooter(); }
  else                  { body = renderPublishedBody(); footer = `<button class="btn-sec ml-auto" onclick="closeReqPanel()">关闭</button>`; }

  document.getElementById('rp-content').innerHTML = `
    <div class="rp-hdr">
      <div class="rp-hdr-top">
        <span class="rp-hdr-title">${titleText}</span>
        <button class="dp-close" onclick="closeReqPanel()">✕</button>
      </div>
      ${stepBar}
    </div>
    <div class="rp-scroll"><div class="rp-body">${body}</div></div>
    <div class="rp-footer">${footer}</div>`;
}
